    elif t == "set_setpoints":
        sp = sim.controller.setpoints
        if "altitude_m" in msg: sp.altitude_m = float(msg["altitude_m"])
        if "yaw_deg" in msg: sp.yaw_rad = float(np.deg2rad(float(msg["yaw_deg"])))
        if "speed_m_s" in msg: sp.speed_m_s = float(msg["speed_m_s"])
        if "pos_hold" in msg: sp.pos_hold = bool(msg["pos_hold"])
        if "target_n_m" in msg: sp.target_n_m = float(msg["target_n_m"])
        if "target_e_m" in msg: sp.target_e_m = float(msg["target_e_m"])
    elif t == "manual":
        sim.controller.manual_mode = bool(msg["enable"])
    elif t == "manual_cmd":
        mc = sim.controller.manual_cmd
        mc.left_N = float(msg.get("left_N", mc.left_N))
        mc.right_N = float(msg.get("right_N", mc.right_N))
        mc.vertical_N = float(msg.get("vertical_N", mc.vertical_N))
    elif t == "set_wind":
        sim.atmosphere.set_uniform_wind(msg["wind_ned_m_s"])
    elif t == "set_atmosphere":
        atm = sim.atmosphere
        if not isinstance(atm, IsaAtmosphere): return
        if "dT_K" in msg: atm.dT_K = float(msg["dT_K"])
        if "turbulence_intensity" in msg:
            atm.turbulence_intensity = float(np.clip(float(msg["turbulence_intensity"]), 0.0, 3.0))
    elif t == "set_wind_layer":
        atm = sim.atmosphere
        if not isinstance(atm, IsaAtmosphere): return
        layer = atm.wind_layers[int(msg["index"])]
        if "speed_m_s" in msg: layer[1] = max(0.0, float(msg["speed_m_s"]))
        if "dir_deg" in msg: layer[2] = float(msg["dir_deg"])
    elif t == "set_wind_preset":
        atm = sim.atmosphere
        if not isinstance(atm, IsaAtmosphere): return
        p = msg["preset"]
        if p == "calm": atm.wind_layers = []
        elif p == "low": atm.wind_layers = [list(l) for l in wind_layers_low_altitude()]
        elif p == "high": atm.wind_layers = [list(l) for l in wind_layers_high_altitude()]
    elif t == "gust":
        atm = sim.atmosphere
        if not isinstance(atm, IsaAtmosphere): return
        atm.trigger_gust(t_s=sim.t_s,
            dir_to_deg=float(msg.get("dir_deg", 0.0)),
            amplitude_m_s=float(msg.get("amplitude_m_s", 1.0)),
            duration_s=float(msg.get("duration_s", 3.0)))
    elif t == "set_solar":
        if "on" in msg: sim.cfg.helium.solar_on = bool(msg["on"])
        if "flux_W_m2" in msg: sim.cfg.helium.solar_flux_W_m2 = float(msg["flux_W_m2"])
    elif t == "set_atmo_mode":
        mode = msg["mode"]
        if mode == "constant":
            new_atm = ConstantAtmosphere(sim.cfg.atmosphere)
        else:
            new_cfg_atm = AtmosphereConfig(model="isa", ground_alt_m=0.0)
            new_atm = make_atmosphere(new_cfg_atm, seed=cfg.seed + 1)
            if mode == "isa_low":
                new_atm.wind_layers = [list(l) for l in wind_layers_low_altitude()]
            elif mode == "isa_high":
                new_atm.wind_layers = [list(l) for l in wind_layers_high_altitude()]
        sim.atmosphere = new_atm
        sim.dynamics.atmosphere = new_atm
        _reset()
`;

async function initPyodide() {
  setLoadProgress(5, '正在加载 Pyodide 运行时…');

  // Dynamically load Pyodide script
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });

  setLoadProgress(15, '正在初始化 Pyodide…');
  py = await loadPyodide({
    indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.5/full/'
  });

  setLoadProgress(35, '正在加载 numpy…');
  await py.loadPackage(['numpy']);

  setLoadProgress(55, '正在加载仿真模块…');
  py.FS.mkdirTree('/airship_sim');

  const AIRSHIP_MODULES = JSON.parse(document.getElementById('airship-py-modules').textContent);
  const mods = ['__init__', 'config', 'math3d', 'added_mass', 'aero',
                 'dynamics', 'sensors', 'controller', 'atmosphere', 'simulation'];
  for (let i = 0; i < mods.length; i++) {
    const mod = mods[i];
    setLoadProgress(55 + Math.round(i / mods.length * 30), `正在加载 ${mod}.py…`);
    py.FS.writeFile(`/airship_sim/${mod}.py`, AIRSHIP_MODULES[mod]);
  }

  setLoadProgress(88, '正在初始化仿真…');
  await py.runPythonAsync(PYTHON_SETUP);

  setLoadProgress(100, '就绪');
  pyReady = true;

  // Enable all controls
  document.querySelectorAll('#panel button, #panel input, #panel select').forEach(el => {
    el.disabled = false;
  });

  // Hide loading overlay
  document.getElementById('loading').style.display = 'none';
}

// ============ 仿真循环 ============
const MAX_TICKS_PER_FRAME = 60;  // 防止卡帧螺旋(最多 60ms 仿真/帧)

function simTick(ts) {
  requestAnimationFrame(simTick);

  if (!pyReady) {
    controls.update();
    renderer.render(scene, camera);
    return;
  }

  if (lastFrameTs !== null && simRunning) {
    const elapsed = ts - lastFrameTs;
    pendingSimMs += elapsed * simTimeScale;
    pendingSimMs = Math.min(pendingSimMs, 100);
    const ticks = Math.min(Math.floor(pendingSimMs), MAX_TICKS_PER_FRAME);
    if (ticks > 0) {
      py.globals.set('_n', ticks);
      py.runPython('step_sim(_n)');
      pendingSimMs -= ticks;
    }
  }
  lastFrameTs = ts;

  // 获取状态并更新 UI
  const stateJson = py.runPython('get_state_json()');
  const m = JSON.parse(stateJson);
  simTimeScale = m.time_scale;
  simRunning = m.running;
  onState(m);

  controls.update();
  renderer.render(scene, camera);
  chAlt.draw(); chYaw.draw(); chSpd.draw();
  drawProfile();
}

function send(obj) {
  if (!pyReady) return;
  py.runPython(`handle_command(${JSON.stringify(JSON.stringify(obj))})`);
  if (obj.type === 'set_atmo_mode' || obj.type === 'set_wind_layer' ||
      obj.type === 'set_wind_preset' || obj.type === 'set_atmosphere') {
    updateProfileData();
  }
}

function updateProfileData() {
  if (!pyReady) return;
  const j = py.runPython('get_profile_json()');
  profileData = JSON.parse(j);
}

function onState(m) {
  const first = lastState === null;
  if (lastState && m.t_s < lastState.t_s) {
    clearTrail(); chAlt.clear(); chYaw.clear(); chSpd.clear();
  }
  lastState = m;

  ship.position.fromArray(m.pos_three);
  ship.quaternion.set(...m.quat_three_xyzw);
  pushTrail(m.pos_three);
  setThrust(arrowL, FWD, m.thrust_N[0]);
  setThrust(arrowR, FWD, m.thrust_N[1]);
  setThrust(arrowV, UP,  m.thrust_N[2]);
  const wv = new THREE.Vector3().fromArray(m.wind_three), wl = wv.length();
  windArrow.position.set(m.pos_three[0], m.pos_three[1]+1.2, m.pos_three[2]);
  windArrow.visible = wl > 1e-3;
  if (windArrow.visible) { windArrow.setDirection(wv.normalize()); windArrow.setLength(wl,.25,.12); }

  chAlt.push(m.t_s, m.pid.alt.sp,   -m.pos_ned_m[2]);
  chYaw.push(m.t_s, m.pid.yaw.sp,    m.euler_deg[2]);
  chSpd.push(m.t_s, m.pid.speed.sp,  m.v_body_m_s[0]);

  hud.textContent =
    `t      ${m.t_s.toFixed(2)} s${m.running?'':'  [paused]'}  ×${m.time_scale}\n` +
    `alt    ${(-m.pos_ned_m[2]).toFixed(2)} m  (sp ${m.pid.alt.sp.toFixed(2)})\n` +
    `yaw    ${m.euler_deg[2].toFixed(1)} °  (sp ${m.pid.yaw.sp.toFixed(1)})\n` +
    `pitch  ${m.euler_deg[1].toFixed(1)} °   roll ${m.euler_deg[0].toFixed(1)} °\n` +
    `u      ${m.v_body_m_s[0].toFixed(2)} m/s (sp ${m.pid.speed.sp.toFixed(2)})\n` +
    `thrust L ${m.thrust_N[0].toFixed(3)} R ${m.thrust_N[1].toFixed(3)} V ${m.thrust_N[2].toFixed(3)} N\n` +
    `wind   ${Math.hypot(...m.wind_ned_m_s).toFixed(2)} m/s   ρ ${m.rho_kg_m3.toFixed(3)}\n` +
    `mode   ${m.manual ? 'MANUAL' : 'AUTO'}`;

  btnPause.textContent = m.running ? '暂停' : '继续';
  btnMode.textContent = `模式: ${m.manual ? 'MANUAL' : 'AUTO'}`;
  btnMode.classList.toggle('active', m.manual);
  if (first) {
    buildGainSliders(m.gains);
    updateProfileData();
  }
  updateAtmoPanel(m, first);
}

// ============ 控制面板 ============
const btnPause = document.getElementById('btnPause');
const btnMode  = document.getElementById('btnMode');
btnPause.onclick = () => send({type: lastState && lastState.running ? 'pause' : 'resume'});
document.getElementById('btnStep').onclick  = () => send({type:'step'});
document.getElementById('btnReset').onclick = () => {
  send({type:'reset'});
  clearTrail(); chAlt.clear(); chYaw.clear(); chSpd.clear();
  lastState = null;
};
document.getElementById('selScale').onchange = e => send({type:'time_scale', value: parseFloat(e.target.value)});
btnMode.onclick = () => send({type:'manual', enable: !(lastState && lastState.manual)});

document.querySelectorAll('[data-sp]').forEach(b => b.onclick = () => {
  const kind = b.dataset.sp;
  if (kind === 'alt') send({type:'set_setpoints', altitude_m: parseFloat(spAlt.value)});
  if (kind === 'yaw') send({type:'set_setpoints', yaw_deg: parseFloat(spYaw.value), pos_hold: false});
  if (kind === 'spd') send({type:'set_setpoints', speed_m_s: parseFloat(spSpd.value), pos_hold: false});
  if (kind === 'pos') send({type:'set_setpoints', pos_hold: spHold.checked,
                            target_n_m: parseFloat(spN.value), target_e_m: parseFloat(spE.value)});
});
const spAlt = document.getElementById('spAlt'), spYaw = document.getElementById('spYaw'),
      spSpd = document.getElementById('spSpd'), spHold = document.getElementById('spHold'),
      spN = document.getElementById('spN'), spE = document.getElementById('spE');

// 常值风
document.getElementById('btnWind').onclick = () => {
  send({type:'set_wind', wind_ned_m_s: [parseFloat(document.getElementById('windN').value),
                                         parseFloat(document.getElementById('windE').value), 0]});
};

// PID 滑块
const gainsDiv = document.getElementById('gains');
function buildGainSliders(gains) {
  gainsDiv.innerHTML = '';
  for (const ch of ['alt','yaw','speed']) {
    const h = document.createElement('div');
    h.innerHTML = `<b style="color:#8fa1bb">${{alt:'高度',yaw:'偏航',speed:'前速'}[ch]}</b>`;
    gainsDiv.appendChild(h);
    for (const k of ['kp','ki','kd']) {
      const init = gains[ch][k];
      const max = init > 0 ? init*4 : {kp:1,ki:.1,kd:1}[k];
      const row = document.createElement('div'); row.className = 'row';
      row.innerHTML = `<label>${k}</label>
        <input type="range" min="0" max="${max}" step="${max/200}" value="${init}">
        <span class="val">${init.toPrecision(3)}</span>`;
      const slider = row.querySelector('input'), val = row.querySelector('.val');
      slider.oninput = () => {
        val.textContent = parseFloat(slider.value).toPrecision(3);
        send({type:'set_gains', channel: ch, gains: {[k]: parseFloat(slider.value)}});
      };
      gainsDiv.appendChild(row);
    }
  }
}

// ============ 手动模式键盘 ============
const keys = {};
const F_MAX = 0.05;
function manualFromKeys() {
  const fwd  = (keys['w']?1:0) - (keys['s']?1:0);
  const turn = (keys['d']?1:0) - (keys['a']?1:0);
  const vert = (keys['q']?1:0) - (keys['e']?1:0);
  return {
    left_N:  Math.max(-F_MAX, Math.min(F_MAX, (fwd + turn) * F_MAX)),
    right_N: Math.max(-F_MAX, Math.min(F_MAX, (fwd - turn) * F_MAX)),
    vertical_N: vert * F_MAX,
  };
}
function updateManual() {
  if (!(lastState && lastState.manual)) return;
  send({type:'manual_cmd', ...manualFromKeys()});
  document.getElementById('manualState').textContent =
    Object.keys(keys).filter(k=>keys[k]).join(' ').toUpperCase();
}
addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const k = e.key.toLowerCase();
  if ('wasdqe'.includes(k) && !keys[k]) { keys[k] = true; updateManual(); }
});
addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if ('wasdqe'.includes(k)) { keys[k] = false; updateManual(); }
});

// ============ 大气面板 ============
let atmoBuilt = false, layerCount = -1;
const atDT = document.getElementById('atDT'), atTurb = document.getElementById('atTurb');
const reqProfile = (() => {
  let timer = null;
  return () => { clearTimeout(timer); timer = setTimeout(updateProfileData, 300); };
})();

atDT.oninput = () => {
  document.getElementById('atDTv').textContent = atDT.value;
  send({type:'set_atmosphere', dT_K: parseFloat(atDT.value)}); reqProfile();
};
atTurb.oninput = () => {
  document.getElementById('atTurbv').textContent = atTurb.value;
  send({type:'set_atmosphere', turbulence_intensity: parseFloat(atTurb.value)});
};
document.querySelectorAll('[data-preset]').forEach(b => b.onclick = () => {
  send({type:'set_wind_preset', preset: b.dataset.preset});
  layerCount = -1;
  reqProfile();
});
document.getElementById('btnGust').onclick = () => send({type:'gust',
  dir_deg: parseFloat(document.getElementById('gustDir').value),
  amplitude_m_s: parseFloat(document.getElementById('gustAmp').value),
  duration_s: parseFloat(document.getElementById('gustDur').value)});
document.getElementById('atSolar').onchange = e => send({type:'set_solar', on: e.target.checked});
document.getElementById('atFlux').onchange = e => send({type:'set_solar', flux_W_m2: parseFloat(e.target.value)});

document.getElementById('atmoMode').onchange = e => {
  send({type:'set_atmo_mode', mode: e.target.value});
  atmoBuilt = false; layerCount = -1;
  clearTrail(); chAlt.clear(); chYaw.clear(); chSpd.clear();
  lastState = null;
  setTimeout(updateProfileData, 100);
};

function buildWindLayerRows(layers) {
  const div = document.getElementById('windLayers');
  div.innerHTML = '';
  layers.forEach((l, i) => {
    const row = document.createElement('div'); row.className = 'row';
    const altLabel = l[0] >= 1000 ? (l[0]/1000)+'km' : l[0]+'m';
    row.innerHTML = `<label>${altLabel}</label>
      速<input type="range" min="0" max="30" step="0.1" value="${l[1]}" data-k="speed">
      <span class="val">${l[1].toFixed(1)}</span>
      向<input type="range" min="0" max="360" step="5" value="${(l[2]+360)%360}" data-k="dir">
      <span class="val">${Math.round((l[2]+360)%360)}°</span>`;
    const [sSpd, sDir] = row.querySelectorAll('input');
    const [vSpd, vDir] = row.querySelectorAll('.val');
    sSpd.oninput = () => { vSpd.textContent = parseFloat(sSpd.value).toFixed(1);
      send({type:'set_wind_layer', index: i, speed_m_s: parseFloat(sSpd.value)}); reqProfile(); };
    sDir.oninput = () => { vDir.textContent = Math.round(sDir.value)+'°';
      send({type:'set_wind_layer', index: i, dir_deg: parseFloat(sDir.value)}); reqProfile(); };
    div.appendChild(row);
  });
}

function updateAtmoPanel(m, first) {
  const has = !!m.atmosphere;
  document.getElementById('atmo').style.display = has ? '' : 'none';
  document.getElementById('atmoNA').style.display = has ? 'none' : '';
  if (!has) return;
  const a = m.atmosphere;
  if (!atmoBuilt) {
    atDT.value = a.dT_K; document.getElementById('atDTv').textContent = a.dT_K;
    atTurb.value = a.turbulence_intensity;
    document.getElementById('atTurbv').textContent = a.turbulence_intensity;
    document.getElementById('atSolar').checked = a.helium.solar_on;
    atmoBuilt = true;
  }
  if (a.wind_layers.length !== layerCount) {
    layerCount = a.wind_layers.length;
    buildWindLayerRows(a.wind_layers);
  }
  document.getElementById('heInfo').textContent = a.helium.enabled
    ? `superheat ${a.helium.superheat_K.toFixed(1)}K  m_He ${(a.helium.m_kg*1000).toFixed(1)}g`
    : '(氦气热力学未开启)';
}

// 垂直剖面图
const profCv = document.getElementById('chartProfile');
function drawProfile() {
  const ctx = profCv.getContext('2d');
  if (profCv.width !== profCv.clientWidth*2) { profCv.width = profCv.clientWidth*2; profCv.height = profCv.clientHeight*2; }
  const W = profCv.width, H = profCv.height;
  ctx.clearRect(0, 0, W, H);
  if (!profileData) return;
  const p = profileData;
  const n = p.alt_m.length;
  const altMax = Math.max(p.alt_m[n-1], 1);
  const Y = a => H - 24 - (a/altMax) * (H-48);
  const half = W/2 - 30;
  const sMax = Math.max(...p.wind_speed_m_s, 1);
  ctx.strokeStyle = '#2fb3c7'; ctx.lineWidth = 2.5; ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const x = 10 + p.wind_speed_m_s[i]/sMax * (half-20);
    i ? ctx.lineTo(x, Y(p.alt_m[i])) : ctx.moveTo(x, Y(p.alt_m[i]));
  }
  ctx.stroke();
  ctx.strokeStyle = '#7d8ea6'; ctx.lineWidth = 2;
  for (let i = 0; i < n; i += 5) {
    const x = 10 + p.wind_speed_m_s[i]/sMax * (half-20), y = Y(p.alt_m[i]);
    const a = (p.wind_dir_deg[i]) * Math.PI/180, L = 16;
    ctx.beginPath(); ctx.moveTo(x, y);
    ctx.lineTo(x + L*Math.sin(a), y - L*Math.cos(a)); ctx.stroke();
  }
  const rMin = Math.min(...p.rho_kg_m3), rMax = Math.max(...p.rho_kg_m3);
  const span = Math.max(rMax - rMin, 1e-6);
  ctx.strokeStyle = '#e8923a'; ctx.lineWidth = 2.5; ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const x = W/2 + 10 + (p.rho_kg_m3[i]-rMin)/span * (half-20);
    i ? ctx.lineTo(x, Y(p.alt_m[i])) : ctx.moveTo(x, Y(p.alt_m[i]));
  }
  ctx.stroke();
  if (lastState && lastState.atmosphere) {
    const y = Y(Math.min(lastState.atmosphere.alt_m, altMax));
    ctx.strokeStyle = '#d96a3b'; ctx.setLineDash([6,6]); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.font = '18px ui-monospace'; ctx.fillStyle = '#5e6b7d';
  ctx.fillText(`wind 0~${sMax.toFixed(1)} m/s`, 10, H-6);
  ctx.fillText(`ρ ${rMin.toFixed(3)}~${rMax.toFixed(3)}`, W/2+10, H-6);
  ctx.fillText(`alt 0~${altMax >= 1000 ? (altMax/1000).toFixed(0)+'km' : altMax.toFixed(0)+'m'}`, 10, 20);
}

// ============ 启动 ============
requestAnimationFrame(simTick);
initPyodide().catch(err => {
  document.getElementById('loadMsg').textContent = '加载失败: ' + err.message;
  document.getElementById('loadMsg').style.color = '#c75454';
  console.error('Pyodide init failed:', err);
});
</script>
