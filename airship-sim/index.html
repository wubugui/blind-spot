<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>飞艇仿真 — 6DOF 工程仿真</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #14171c; color: #cdd3dd; font-family: ui-monospace, Menlo, Consolas, monospace; overflow: hidden; display: flex; }
  #view { flex: 1; position: relative; }
  #hud { position: absolute; top: 10px; left: 10px; background: rgba(10,12,16,.72); padding: 10px 14px; border-radius: 6px; font-size: 12px; line-height: 1.7; pointer-events: none; white-space: pre; }
  #panel { width: 380px; height: 100vh; overflow-y: auto; background: #1a1e25; border-left: 1px solid #2a313c; padding: 10px; font-size: 12px; }
  #panel h3 { margin: 12px 0 6px; font-size: 12px; color: #8fa1bb; border-bottom: 1px solid #2a313c; padding-bottom: 4px; }
  button { background: #2c3440; color: #cdd3dd; border: 1px solid #3a4250; border-radius: 4px; padding: 4px 10px; margin: 2px; cursor: pointer; font-family: inherit; font-size: 12px; }
  button:hover { background: #39434f; }
  button.active { background: #2b5a8c; border-color: #3d77b5; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  canvas.chart { width: 100%; height: 110px; background: #11141a; border: 1px solid #2a313c; border-radius: 4px; display: block; margin-bottom: 6px; }
  .row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  .row label { width: 60px; color: #8fa1bb; }
  .row input[type=range] { flex: 1; }
  .row input[type=number] { width: 70px; background: #11141a; color: #cdd3dd; border: 1px solid #2a313c; border-radius: 3px; padding: 2px 4px; font-family: inherit; }
  .val { width: 64px; text-align: right; color: #d8e2f0; }
  .hint { color: #5e6b7d; font-size: 11px; line-height: 1.5; }
  select { background: #2c3440; color: #cdd3dd; border: 1px solid #3a4250; border-radius: 4px; padding: 3px 6px; font-family: inherit; font-size: 12px; }
  #manualState { color: #e8923a; }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0; background: #0d1014;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; gap: 18px;
  }
  #loading h1 { margin: 0; font-size: 18px; color: #8fa1bb; font-weight: normal; }
  #loadBar { width: 320px; height: 6px; background: #2a313c; border-radius: 3px; overflow: hidden; }
  #loadFill { height: 100%; background: #3d77b5; width: 0%; transition: width .3s; border-radius: 3px; }
  #loadMsg { font-size: 12px; color: #5e6b7d; min-height: 18px; }
  #loadNote { font-size: 11px; color: #3a4250; text-align: center; max-width: 340px; line-height: 1.6; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <h1>飞艇 6DOF 工程仿真</h1>
  <div id="loadBar"><div id="loadFill"></div></div>
  <div id="loadMsg">正在加载…</div>
  <div id="loadNote">首次加载需下载 Pyodide + numpy (~45MB)<br>加载完成后物理计算在浏览器本地运行</div>
</div>

<!-- 3D 视图 -->
<div id="view"><div id="hud">loading…</div></div>

<!-- 控制面板 -->
<div id="panel">
  <h3>仿真控制</h3>
  <div class="row">
    <button id="btnPause" disabled>暂停</button>
    <button id="btnStep" disabled>单步</button>
    <button id="btnReset" disabled>重置</button>
    倍率
    <select id="selScale" disabled>
      <option>0.2</option><option>0.5</option><option selected>1</option><option>2</option><option>5</option>
    </select>
  </div>
  <div class="row">
    <button id="btnMode" disabled>模式: AUTO</button>
    <span id="manualState"></span>
  </div>
  <div class="hint">手动模式按键: W/S 前进/后退, A/D 左/右转, Q/E 上升/下降(松开归零)</div>

  <h3>设定值</h3>
  <div class="row"><label>高度 m</label><input type="number" id="spAlt" step="0.1" value="1.5" disabled><button data-sp="alt" disabled>下发</button></div>
  <div class="row"><label>航向 °</label><input type="number" id="spYaw" step="5" value="0" disabled><button data-sp="yaw" disabled>下发</button></div>
  <div class="row"><label>前速 m/s</label><input type="number" id="spSpd" step="0.05" value="0" disabled><button data-sp="spd" disabled>下发</button></div>
  <div class="row"><label>位置保持</label><input type="checkbox" id="spHold" checked disabled>
    N <input type="number" id="spN" step="0.5" value="0" style="width:54px" disabled>
    E <input type="number" id="spE" step="0.5" value="0" style="width:54px" disabled>
    <button data-sp="pos" disabled>下发</button></div>

  <h3>遥测(滚动 30s,设定值虚线)</h3>
  <canvas class="chart" id="chartAlt"></canvas>
  <canvas class="chart" id="chartYaw"></canvas>
  <canvas class="chart" id="chartSpd"></canvas>

  <h3>PID 增益(拖动即实时生效)</h3>
  <div id="gains"></div>
  <div class="hint">输出限幅/滤波等高级参数见 config.py</div>

  <h3>大气</h3>
  <div class="row">
    <label>模式</label>
    <select id="atmoMode" disabled>
      <option value="constant">室内(常密度)</option>
      <option value="isa_low">低空 ISA + 边界层风</option>
      <option value="isa_high">高空 ISA 0-30km</option>
    </select>
  </div>
  <div id="atmoNA" class="hint">当前为室内常密度模型</div>
  <div id="atmo" style="display:none">
    <div class="row"><label>ΔT K</label>
      <input type="range" id="atDT" min="-20" max="20" step="0.5" value="0"><span class="val" id="atDTv">0</span></div>
    <div class="row"><label>湍流</label>
      <input type="range" id="atTurb" min="0" max="2" step="0.05" value="0"><span class="val" id="atTurbv">0</span></div>
    <div class="row"><label>预置</label>
      <button data-preset="calm">无风</button>
      <button data-preset="low">低空边界层</button>
      <button data-preset="high">高空0-30km</button></div>
    <div id="windLayers"></div>
    <div class="row"><label>阵风</label>
      向<input type="number" id="gustDir" value="90" style="width:48px">°
      幅<input type="number" id="gustAmp" value="1.0" step="0.2" style="width:48px">m/s
      时<input type="number" id="gustDur" value="3" step="0.5" style="width:42px">s
      <button id="btnGust">触发</button></div>
    <div class="row"><label>太阳辐照</label>
      <input type="checkbox" id="atSolar">
      <input type="number" id="atFlux" value="1000" step="100" style="width:64px">W/m²
      <span id="heInfo" class="hint"></span></div>
    <div class="hint">垂直剖面:左=风速,右=密度;横线=飞艇当前高度</div>
    <canvas class="chart" id="chartProfile" style="height:220px"></canvas>
  </div>
  <div class="row" style="margin-top:8px">
    <label>常值风</label>
    N<input type="number" id="windN" value="0" step="0.1" style="width:52px">
    E<input type="number" id="windE" value="0" step="0.1" style="width:52px">
    m/s
    <button id="btnWind" disabled>下发</button>
  </div>
</div>

<!--
  渲染层约束(工程仿真规格):不含物理逻辑;不为动画平滑插值/滤波物理状态,
  3D 姿态与曲线一律直接显示最近一次推进后的原始状态值;坐标转换在 Python 层完成。
-->
<script type="application/json" id="airship-py-modules">{"__init__": "\"\"\"室内遥控飞艇 6DOF 工程仿真。\n\n工程仿真工具,不是游戏:物理保真优先,所有参数有依据,\n结果可复现(固定种子逐位一致),渲染层不含物理逻辑。\n\n单位制:全程 SI,变量名带单位后缀(如 rho_kg_m3, thrust_N)。\n坐标系:世界系 NED(x北 y东 z向下),体轴系 x前 y右 z下。\n物理简化注释格式: [假设] 内容 / 影响 / 何时失效\n\"\"\"\n\n__version__ = \"0.1.0\"\n", "config": "\"\"\"集中配置:所有物理参数(SI 单位,变量名带单位后缀)。\n\n支持 JSON 序列化保存/加载(可复现性要求:同一配置 + 同一种子 → 逐位一致轨迹)。\n\"\"\"\nfrom __future__ import annotations\n\nimport dataclasses\nimport json\nfrom dataclasses import dataclass, field\n\nimport numpy as np\n\nGRAVITY_M_S2 = 9.80665  # 标准重力加速度\n\n\n@dataclass\nclass HullConfig:\n    \"\"\"囊体几何:长椭球,x 轴为纵轴。\"\"\"\n    length_m: float = 2.0          # 总长(= 2a)\n    diameter_m: float = 0.8        # 最大直径(= 2b)\n\n    @property\n    def a_m(self) -> float:\n        return self.length_m / 2.0\n\n    @property\n    def b_m(self) -> float:\n        return self.diameter_m / 2.0\n\n    @property\n    def volume_m3(self) -> float:\n        # 长椭球体积 V = 4/3·π·a·b² ≈ 0.670 m³\n        return 4.0 / 3.0 * np.pi * self.a_m * self.b_m**2\n\n    @property\n    def cross_area_m2(self) -> float:\n        \"\"\"横截面积 πb²(轴向阻力参考面积)。\"\"\"\n        return np.pi * self.b_m**2\n\n    @property\n    def side_area_m2(self) -> float:\n        \"\"\"侧投影面积 πab(侧向阻力参考面积,椭圆)。\"\"\"\n        return np.pi * self.a_m * self.b_m\n\n\n@dataclass\nclass MassConfig:\n    \"\"\"质量分布。动力学参考点取浮心 CB(=椭球几何中心),体轴系 z 向下。\n\n    [假设] 囊体蒙皮质量近似为薄椭球壳、氦气为均匀实心椭球、吊舱为质点\n    / 转动惯量误差约 ±20%,对摆动周期影响 ~10%\n    / 需要精确姿态动力学(如挂载云台)时应实测惯量。\n    \"\"\"\n    m_envelope_kg: float = 0.108        # 囊体蒙皮+尾翼等结构(≈4.0m² 表面积 × 27g/m² 薄膜)\n    m_gondola_kg: float = 0.600716      # 吊舱(电机+电池+电子设备),默认值由 default_config() 配平得出\n    rho_helium_kg_m3: float = 0.175     # 囊内气体密度 = 地面空气1.225 - 净浮力1.05(含杂质氦,纯氦≈0.169)\n    r_gondola_b_m: tuple[float, float, float] = (0.0, 0.0, 0.55)\n    # 吊舱质心在体轴系中相对浮心的位置(z 向下,0.55m = 囊体半径0.4 + 吊挂0.15)\n\n\n@dataclass\nclass AeroConfig:\n    \"\"\"气动阻力系数。\n\n    [假设] 椭球轴向 Cd 取 0.075(文献典型范围 0.05~0.1,长细比2.5、层流为主),\n    侧向(横流)Cd 取 0.9(圆柱横流典型 0.8~1.0)\n    / Cd 不随 Re 与攻角变化,误差约 ±30% / 速度接近 2m/s 或大攻角时需风洞或CFD修正。\n    \"\"\"\n    cd_axial: float = 0.075        # 轴向阻力系数,参考面积 = 横截面积\n    cd_lateral: float = 0.9        # 侧向阻力系数,参考面积 = 侧投影面积\n    # 转动阻尼:俯仰/偏航主项为条带理论横流阻尼(系数由 cd_lateral 推出,见 aero.py),\n    # 此处为附加的小线性阻尼(粘性/蒙皮摩擦),量级估计:\n    c_ang_lin_roll_Nms: float = 2e-4    # [假设] 滚转仅有蒙皮摩擦阻尼,取小值 / 滚转收敛慢 / 不影响其他通道\n    c_ang_lin_pitch_Nms: float = 1e-3\n    c_ang_lin_yaw_Nms: float = 1e-3\n\n\n@dataclass\nclass FinConfig:\n    \"\"\"十字尾翼(2 片水平 + 2 片垂直)。\n\n    设计依据:无尾翼椭球受 Munk 力矩方向不稳定(仿真验证:0.5m/s 风下航向 10s 内\n    发散到横对风,差速力矩 ±0.01N·m 比 Munk 力矩斜率小一个量级),真实飞艇必须装尾翼。\n    完全抵消 Munk 需 S·CLα·|x_fin| > 2(k2-k1)V ≈ 0.81 m³,典型尾翼只能做到部分静稳定,\n    剩余由航向阻尼 + 主动控制兜底(与真实飞艇一致)。\n\n    [假设] 线性升力线模型 F = ½ρ·CLα·S·|u|·v_local,无失速、无翼间干扰\n    / 小侧滑角(<20°)下良好 / 大侧滑/横对风时高估恢复力矩——但此时船体侧阻力主导。\n    [假设] 忽略尾翼自身的附加质量与轴向阻力 / 两者 ≪ 囊体对应项 / 精细配平时计入。\n    \"\"\"\n    enabled: bool = True\n    s_plane_m2: float = 0.15      # 单平面(一对尾翼)投影总面积;约为侧投影面积的 12%\n    cl_alpha_per_rad: float = 2.6  # 低展弦比升力线斜率 2π·AR/(AR+2),AR≈1.5\n    x_fin_m: float = -0.85         # 尾翼气动中心纵向位置(艉部,浮心后 0.85m)\n\n\n@dataclass\nclass ActuatorConfig:\n    \"\"\"执行器:左右差速电机(体轴 +x 推力)+ 垂直电机(体轴 -z 推力为正=向上)。\"\"\"\n    thrust_max_N: float = 0.05       # 单个电机推力上限\n    tau_s: float = 0.1               # 电机一阶响应时间常数\n    motor_sep_y_m: float = 0.10      # 左右电机距中线的横向半距\n    # 电机安装在吊舱上(z 与吊舱一致):推力线不过重心,会产生俯仰力矩——按真实几何建模,不简化掉\n    motor_z_b_m: float = 0.55\n    # [假设] 电机可双向出力(±thrust_max),正反转推力对称\n    # / 实际反转效率低 ~30% / 选定不可反转螺旋桨时需把下限改为 0\n    reversible: bool = True\n\n\n@dataclass\nclass SensorConfig:\n    \"\"\"传感器模型(模拟 ESP32 + IMU + BMP390)。\"\"\"\n    imu_rate_hz: float = 100.0\n    baro_rate_hz: float = 10.0\n    baro_noise_std_m: float = 0.05       # BMP390 高度噪声,σ=0.05m → 2σ≈±0.1m(规格给定)\n    gyro_noise_std_rad_s: float = 0.002  # 典型 MEMS 陀螺白噪声(≈0.1°/s)\n    # [假设] 姿态角与前向速度由机载融合/外部定位直接给出,等效为白噪声测量\n    # / 跳过姿态估计器的收敛与漂移动态 / 验证估计算法本身时需替换为原始 IMU + 融合器\n    att_noise_std_rad: float = 0.005     # ≈0.3°\n    vel_noise_std_m_s: float = 0.02\n\n\n@dataclass\nclass PidGains:\n    kp: float = 0.0\n    ki: float = 0.0\n    kd: float = 0.0\n    tau_d_s: float = 0.2       # 微分项一阶低通时间常数\n    tau_meas_s: float = 0.0    # 测量值一阶低通(0=不滤波)。用于低采样率/高噪声测量\n    #   (如 10Hz 保持采样的气压计):避免保持跳变被微分放大、噪声经 Kp 在\n    #   推力上限处单边削顶(整流)压低平均推力。控制器侧滤波,不触碰物理状态。\n    i_band: float = 0.0        # 积分分离阈值:|误差| > i_band 时冻结积分(0=不启用)。\n    #   解决大阶跃期间(尤其反向饱和刹车段,条件抗饱和不拦截)积分累积导致的超调\n    out_min: float = -1.0\n    out_max: float = 1.0\n\n\n@dataclass\nclass ControlConfig:\n    \"\"\"串级 PID。增益初值由回路整形估算(见各注释),由阶跃/抗风场景验证修正。\n\n    通道结构:\n      高度:气压计高度 → 垂直推力 [N]\n      偏航:航向角     → 偏航力矩指令 [N·m] → 差速\n      前速:体轴前向速度 → 总前向推力 [N]\n      位置保持(外环,可选):水平位置误差 → 航向设定 + 前速设定\n    \"\"\"\n    rate_hz: float = 50.0\n    # 高度通道:垂直等效质量 m+k2ρV ≈ 1.45 kg;取 ωn≈0.26 rad/s, ζ≈1\n    #   Kp = m·ωn² ≈ 0.10 N/m, Kd = 2ζωn·m ≈ 0.75(气压计 10Hz/σ0.05m,微分须重滤波,\n    #   实取 0.4 + τ_d=1.5s 折衷);积分项只负担前馈标定残差\n    alt: PidGains = field(default_factory=lambda: PidGains(\n        kp=0.10, ki=0.01, kd=0.4, tau_d_s=1.5, tau_meas_s=0.6, i_band=0.4,\n        out_min=-0.05, out_max=0.05))\n    # 悬停油门前馈 [N]:抵消配重的稳态推力,默认由 default_config() 置为 heaviness·g。\n    # [假设] 悬停油门已在实机试飞中标定(标准做法),仿真中直接取配平值\n    # / 免去积分器分钟级爬升 / 标定误差大或浮力随环境变化快时由积分项兜底\n    alt_ff_N: float = 0.0\n    # 偏航通道:偏航等效惯量 I+I_a ≈ 0.14 kg·m²;ωn≈0.35 rad/s, ζ≈0.9\n    #   Kp = I·ωn² ≈ 0.017 N·m/rad, Kd = 2ζωn·I ≈ 0.087;最大差速力矩 ±0.01 N·m\n    #   90° 阶跃验证后微调:Kd→0.11 压超调(实测16%→目标<10%),Ki→0.002 加快残差收敛\n    yaw: PidGains = field(default_factory=lambda: PidGains(\n        kp=0.017, ki=0.002, kd=0.11, tau_d_s=0.3, i_band=0.35,\n        out_min=-0.01, out_max=0.01))\n    # 前速通道:轴向等效质量 m+k1ρV ≈ 0.95 kg;一阶目标带宽 ω≈0.3 rad/s → Kp = m·ω ≈ 0.29\n    speed: PidGains = field(default_factory=lambda: PidGains(\n        kp=0.29, ki=0.03, kd=0.0, out_min=-0.1, out_max=0.1))\n    # 位置保持外环(P):期望地速矢量 → 航向设定 + 前速设定(航向投影,可为负)\n    pos_hold_kp_1_s: float = 0.15\n    pos_hold_max_speed_m_s: float = 0.5\n    pos_hold_deadband_m: float = 0.5    # 死区:侧向(欠驱动方向)漂移小于该值时不调头修正。\n    #   死区过小(实测 0.15m)会在常值风下触发周期性大角度调头→横对风→被吹离\n    pos_hold_yaw_rate_max_rad_s: float = 0.2   # 航向设定速率限制(≈11°/s):\n    #   方位角跳变(死区边界、近距离掠过目标)不直接进入偏航环,缓慢蟹行修正侧向误差\n\n\n@dataclass\nclass AtmosphereConfig:\n    \"\"\"大气模块配置。\n\n    model:\n      constant — 常密度+常值风(室内/单元测试)\n      isa      — ISA 标准大气剖面 + 分层风(层间线性插值) + 湍流 + 阵风\n    风层格式:(高度m, 风速m/s, 吹向方位角deg)。注意此处方位角为\"风的去向\"\n    (0°=吹向北,90°=吹向东),与气象学\"来向\"惯例相反,便于直接合成矢量。\n    \"\"\"\n    model: str = \"constant\"              # constant | isa\n    rho_const_kg_m3: float = 1.225       # constant 模型空气密度(ISA 海平面)\n    temperature_const_K: float = 288.15\n    pressure_const_Pa: float = 101325.0\n    wind_ned_m_s: tuple[float, float, float] = (0.0, 0.0, 0.0)  # 常值风(世界系 NED)\n\n    # ---- isa 模型参数 ----\n    ground_alt_m: float = 0.0            # 仿真 z=0 对应的海拔(高空模式设为放飞点海拔)\n    dT_K: float = 0.0                    # 温度偏移 ΔT(冷/热天整体平移)。\n    # [假设] ΔT 只平移温度、不改气压剖面,密度按 ρ=p/(R(T+ΔT)) / 与\"热天密度低\"\n    #   的工程经验一致 / 需要精确非标准大气时应使用实测探空数据\n    wind_layers: tuple = ()              # ((alt_m, speed_m_s, dir_to_deg), ...) 按高度升序\n    turbulence_intensity: float = 0.0    # 湍流强度倍率:0=关,1=标准(σ剖面见 atmosphere.py)\n    turb_update_dt_s: float = 0.01       # 湍流状态更新步长(100Hz)\n\n\n@dataclass\nclass HeliumThermalConfig:\n    \"\"\"氦气热力学(可开关,高空模式用):一阶热模型。\n\n        m_he·c_p·dT_he/dt = Q_solar − h·A_surf·(T_he − T_amb)\n        Q_solar = absorptivity · flux · A_proj   (太阳辐照开启时)\n        ρ_he = p_amb / (R_eff · T_he)            (囊体排气孔通大气,内外压差≈0)\n\n    superheat(T_he−T_amb)降低氦气密度→减少氦气质量(定容排气)→增大净浮力。\n    [假设] 囊内氦气温度均匀(集总参数)、与环境只经囊膜一阶换热,h=3 W/m²K\n      (自然对流典型值 2~5) / 时间常数 m·c_p/(hA) ≈ 50s,量级正确\n      / 需要分层温度场或强迫对流(高速飞行)时失效。\n    [假设] 囊内气体用等效气体常数 R_eff = p₀/(ρ_he_cfg·T₀)(含杂质,与配平密度自洽)\n      / 保证 T_he=T_amb 时回到配置浮力 / 纯度变化大时需重新标定。\n    [假设] 吸收率 0.2(白色/银色囊膜),太阳辐照默认 1000 W/m²(地面晴天;\n      高空可调至 1361) / 决定平衡 superheat ≈ Q/(hA) ≈ 20K,与飞艇实测 10~30K 一致。\n    \"\"\"\n    enabled: bool = False\n    solar_on: bool = False               # 白天/夜间切换(运行时可改)\n    solar_flux_W_m2: float = 1000.0\n    absorptivity: float = 0.2\n    h_film_W_m2K: float = 3.0\n    cp_J_kgK: float = 5193.0             # 氦定压比热\n\n\n@dataclass\nclass SimConfig:\n    \"\"\"顶层配置。\"\"\"\n    dt_physics_s: float = 0.001          # 物理步长 1ms,RK4\n    seed: int = 20260611                 # 全局随机种子(传感器噪声/湍流由此派生)\n    hull: HullConfig = field(default_factory=HullConfig)\n    mass: MassConfig = field(default_factory=MassConfig)\n    aero: AeroConfig = field(default_factory=AeroConfig)\n    fins: FinConfig = field(default_factory=FinConfig)\n    actuator: ActuatorConfig = field(default_factory=ActuatorConfig)\n    sensor: SensorConfig = field(default_factory=SensorConfig)\n    control: ControlConfig = field(default_factory=ControlConfig)\n    atmosphere: AtmosphereConfig = field(default_factory=AtmosphereConfig)\n    helium: HeliumThermalConfig = field(default_factory=HeliumThermalConfig)\n\n    # ---- 序列化(可复现性要求) ----\n    def to_json(self) -> str:\n        return json.dumps(dataclasses.asdict(self), indent=2)\n\n    def save(self, path: str) -> None:\n        with open(path, \"w\") as f:\n            f.write(self.to_json())\n\n    @classmethod\n    def from_json(cls, text: str) -> \"SimConfig\":\n        return _from_dict(cls, json.loads(text))\n\n    @classmethod\n    def load(cls, path: str) -> \"SimConfig\":\n        with open(path) as f:\n            return cls.from_json(f.read())\n\n\ndef _from_dict(cls, d):\n    \"\"\"按 dataclass 字段类型递归还原(list → tuple)。\"\"\"\n    kwargs = {}\n    for f in dataclasses.fields(cls):\n        if f.name not in d:\n            continue\n        v = d[f.name]\n        if dataclasses.is_dataclass(f.type) if isinstance(f.type, type) else False:\n            kwargs[f.name] = _from_dict(f.type, v)\n        elif isinstance(v, dict):\n            sub = f.default_factory() if f.default_factory is not dataclasses.MISSING else None\n            kwargs[f.name] = _from_dict(type(sub), v) if sub is not None else v\n        elif isinstance(v, list):\n            kwargs[f.name] = _deep_tuple(v)\n        else:\n            kwargs[f.name] = v\n    return cls(**kwargs)\n\n\ndef _deep_tuple(v):\n    return tuple(_deep_tuple(x) if isinstance(x, list) else x for x in v)\n\n\ndef default_config(heaviness_kg: float = 0.005) -> SimConfig:\n    \"\"\"默认配置:在地面密度下把吊舱质量配平为总重 = 排开空气质量 + heaviness_kg。\n\n    heaviness_kg 默认 5g(略负浮力,近中性)。\n    \"\"\"\n    cfg = SimConfig()\n    v = cfg.hull.volume_m3\n    m_helium = cfg.mass.rho_helium_kg_m3 * v\n    m_displaced = cfg.atmosphere.rho_const_kg_m3 * v\n    cfg.mass.m_gondola_kg = m_displaced + heaviness_kg - cfg.mass.m_envelope_kg - m_helium\n    if cfg.mass.m_gondola_kg <= 0:\n        raise ValueError(\"envelope + helium already heavier than buoyancy + heaviness\")\n    # 悬停油门前馈 = 配重 × g(视为实机试飞标定值,见 ControlConfig 注释)\n    cfg.control.alt_ff_N = heaviness_kg * GRAVITY_M_S2\n    return cfg\n", "math3d": "\"\"\"四元数与三维旋转工具。\n\n约定:\n- 四元数 q = [w, x, y, z],单位范数,表示体轴系→世界系(NED)的旋转:\n  v_world = R(q) @ v_body\n- 欧拉角为航空 ZYX 顺序:yaw(ψ, 绕z/向下轴) → pitch(θ, 绕y) → roll(φ, 绕x),单位 rad\n- 角速度 omega 为体轴系下的角速度 [p, q, r],单位 rad/s\n\"\"\"\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef quat_normalize(q: np.ndarray) -> np.ndarray:\n    \"\"\"归一化四元数。\"\"\"\n    n = np.linalg.norm(q)\n    if n == 0.0:\n        raise ValueError(\"zero quaternion\")\n    return q / n\n\n\ndef quat_mul(q1: np.ndarray, q2: np.ndarray) -> np.ndarray:\n    \"\"\"四元数乘法 q1 ⊗ q2。\"\"\"\n    w1, x1, y1, z1 = q1\n    w2, x2, y2, z2 = q2\n    return np.array([\n        w1 * w2 - x1 * x2 - y1 * y2 - z1 * z2,\n        w1 * x2 + x1 * w2 + y1 * z2 - z1 * y2,\n        w1 * y2 - x1 * z2 + y1 * w2 + z1 * x2,\n        w1 * z2 + x1 * y2 - y1 * x2 + z1 * w2,\n    ])\n\n\ndef quat_conj(q: np.ndarray) -> np.ndarray:\n    return np.array([q[0], -q[1], -q[2], -q[3]])\n\n\ndef quat_to_rotmat(q: np.ndarray) -> np.ndarray:\n    \"\"\"四元数 → 旋转矩阵 R(体→世界), v_world = R @ v_body。\"\"\"\n    w, x, y, z = q\n    return np.array([\n        [1 - 2 * (y * y + z * z), 2 * (x * y - w * z), 2 * (x * z + w * y)],\n        [2 * (x * y + w * z), 1 - 2 * (x * x + z * z), 2 * (y * z - w * x)],\n        [2 * (x * z - w * y), 2 * (y * z + w * x), 1 - 2 * (x * x + y * y)],\n    ])\n\n\ndef quat_rotate(q: np.ndarray, v_body: np.ndarray) -> np.ndarray:\n    \"\"\"用 q 旋转向量:体轴系 → 世界系。\"\"\"\n    return quat_to_rotmat(q) @ v_body\n\n\ndef quat_rotate_inv(q: np.ndarray, v_world: np.ndarray) -> np.ndarray:\n    \"\"\"世界系 → 体轴系。\"\"\"\n    return quat_to_rotmat(q).T @ v_world\n\n\ndef quat_derivative(q: np.ndarray, omega_body_rad_s: np.ndarray) -> np.ndarray:\n    \"\"\"姿态运动学: q̇ = ½ q ⊗ [0, ω_body]。\"\"\"\n    omega_quat = np.array([0.0, *omega_body_rad_s])\n    return 0.5 * quat_mul(q, omega_quat)\n\n\ndef quat_from_euler(roll_rad: float, pitch_rad: float, yaw_rad: float) -> np.ndarray:\n    \"\"\"ZYX 欧拉角 → 四元数(体→世界)。\"\"\"\n    cr, sr = np.cos(roll_rad / 2), np.sin(roll_rad / 2)\n    cp, sp = np.cos(pitch_rad / 2), np.sin(pitch_rad / 2)\n    cy, sy = np.cos(yaw_rad / 2), np.sin(yaw_rad / 2)\n    return np.array([\n        cr * cp * cy + sr * sp * sy,\n        sr * cp * cy - cr * sp * sy,\n        cr * sp * cy + sr * cp * sy,\n        cr * cp * sy - sr * sp * cy,\n    ])\n\n\ndef quat_to_euler(q: np.ndarray) -> tuple[float, float, float]:\n    \"\"\"四元数 → (roll, pitch, yaw),ZYX 顺序,rad。pitch=±90° 处存在万向锁,按惯例截断。\"\"\"\n    w, x, y, z = q\n    roll = np.arctan2(2 * (w * x + y * z), 1 - 2 * (x * x + y * y))\n    sinp = 2 * (w * y - z * x)\n    pitch = np.arcsin(np.clip(sinp, -1.0, 1.0))\n    yaw = np.arctan2(2 * (w * z + x * y), 1 - 2 * (y * y + z * z))\n    return float(roll), float(pitch), float(yaw)\n\n\ndef cross3(a: np.ndarray, b: np.ndarray) -> np.ndarray:\n    \"\"\"3 维叉积。等价 np.cross,但避开其对小向量的巨大调用开销\n    (np.cross 走通用 moveaxis 路径,~50µs/次;此实现 ~3µs,动力学热点)。\"\"\"\n    return np.array([a[1] * b[2] - a[2] * b[1],\n                     a[2] * b[0] - a[0] * b[2],\n                     a[0] * b[1] - a[1] * b[0]])\n\n\ndef skew(v: np.ndarray) -> np.ndarray:\n    \"\"\"反对称矩阵 S(v),使 S(v) @ u = v × u。\"\"\"\n    return np.array([\n        [0.0, -v[2], v[1]],\n        [v[2], 0.0, -v[0]],\n        [-v[1], v[0], 0.0],\n    ])\n\n\ndef wrap_angle_rad(a: float) -> float:\n    \"\"\"把角度折叠到 (-π, π]。\"\"\"\n    return float(np.arctan2(np.sin(a), np.cos(a)))\n", "added_mass": "\"\"\"长椭球(prolate spheroid)的附加质量 — Lamb 系数。\n\n对飞艇至关重要:排开空气质量(ρV ≈ 0.82 kg)与艇身总质量(≈0.83 kg)同量级,\n附加质量不可省略。\n\n来源公式(Lamb, Hydrodynamics, 1932, §114-115;亦见 Munk NACA TR-184):\n长半轴 a(沿体轴 x),短半轴 b,离心率 e = sqrt(1 - b²/a²),令\n    L = ln((1+e)/(1-e))\n则两个形状因子为\n    alpha0 = 2(1-e²)/e³ · (½L - e)            (轴向)\n    beta0  = 1/e² - (1-e²)/(2e³) · L          (横向)\nLamb 惯性系数:\n    k1 = alpha0 / (2 - alpha0)    轴向平动附加质量系数\n    k2 = beta0  / (2 - beta0)     横向平动附加质量系数\n    k' = e⁴(beta0-alpha0) / [(2-e²)·(2e² - (2-e²)(beta0-alpha0))]\n                                  绕横轴转动附加惯量系数\n附加质量/惯量:\n    m_a_axial   = k1 · ρ V                  (体轴 x 平动)\n    m_a_lateral = k2 · ρ V                  (体轴 y、z 平动)\n    I_a_trans   = k' · I_fluid,  I_fluid = ρV(a²+b²)/5\n                                  (绕 y、z 转动;I_fluid 为排开流体椭球绕横轴的转动惯量)\n    I_a_roll    = 0   (理想流体中旋成体绕纵轴旋转不带动流体,势流解为零)\n\n极限验证(单元测试用):\n    a/b → 1(球):k1 = k2 = 0.5,k' = 0\n    a/b → ∞(细长体):k1 → 0,k2 → 1,k' → 1\n\n[假设] 囊体为精确长椭球且为刚体,用势流附加质量(无粘、无分离)\n/ 低速(室内 <2 m/s, Re~1e5)下附加质量主要由势流决定,误差小\n/ 大攻角流动分离或囊体柔性变形明显时失效。\n\"\"\"\nfrom __future__ import annotations\n\nimport numpy as np\n\n\ndef lamb_k_factors(a_m: float, b_m: float) -> tuple[float, float, float]:\n    \"\"\"返回 (k1, k2, k_prime)。要求 a > b(长椭球)。\n\n    a/b 非常接近 1 时直接用球的解析极限,避免 e→0 的数值病态。\n    \"\"\"\n    if a_m <= 0 or b_m <= 0:\n        raise ValueError(\"semi-axes must be positive\")\n    if a_m < b_m:\n        raise ValueError(\"expected prolate spheroid: a >= b\")\n    fineness = a_m / b_m\n    if fineness < 1.0 + 1e-6:\n        return 0.5, 0.5, 0.0\n\n    e = np.sqrt(1.0 - (b_m / a_m) ** 2)\n    L = np.log((1.0 + e) / (1.0 - e))\n    alpha0 = 2.0 * (1.0 - e**2) / e**3 * (0.5 * L - e)\n    beta0 = 1.0 / e**2 - (1.0 - e**2) / (2.0 * e**3) * L\n\n    k1 = alpha0 / (2.0 - alpha0)\n    k2 = beta0 / (2.0 - beta0)\n    num = e**4 * (beta0 - alpha0)\n    den = (2.0 - e**2) * (2.0 * e**2 - (2.0 - e**2) * (beta0 - alpha0))\n    k_prime = num / den\n    return float(k1), float(k2), float(k_prime)\n\n\ndef added_mass_matrix_unit_rho(a_m: float, b_m: float) -> np.ndarray:\n    \"\"\"单位空气密度下的 6×6 附加质量矩阵 M_A/ρ(对角,体轴系,参考点=浮心/体心)。\n\n    实际使用时乘以当地空气密度: M_A = rho_kg_m3 * added_mass_matrix_unit_rho(a, b)。\n    椭球几何中心 = 浮心,附加质量张量在此点为对角,这是把动力学参考点取在浮心的原因之一。\n    顺序: [x平动, y平动, z平动, 绕x转动, 绕y转动, 绕z转动]\n    \"\"\"\n    k1, k2, k_prime = lamb_k_factors(a_m, b_m)\n    volume_m3 = 4.0 / 3.0 * np.pi * a_m * b_m**2\n    i_fluid_unit_rho = volume_m3 * (a_m**2 + b_m**2) / 5.0\n    return np.diag([\n        k1 * volume_m3,\n        k2 * volume_m3,\n        k2 * volume_m3,\n        0.0,                       # 绕纵轴:势流解为零\n        k_prime * i_fluid_unit_rho,\n        k_prime * i_fluid_unit_rho,\n    ])\n", "aero": "\"\"\"气动阻力与转动阻尼(体轴系,作用点/参考点 = 浮心)。\n\n包含:\n1. 轴向阻力:  Fx = -½ρ·Cd_ax·A_cross·|u_r|·u_r   (A_cross = πb², 横截面积)\n2. 侧向阻力:  横流合速度 v_yz = √(v_r²+w_r²),\n              F_yz = -½ρ·Cd_lat·A_side·|v_yz|·(v_r, w_r)   (A_side = πab, 侧投影面积)\n3. 俯仰/偏航横流转动阻尼(条带理论推导):\n   绕浮心以角速度 q 旋转时,纵向位置 x 处局部横流速度 = q·x,局部宽度 w(x)=2b√(1-x²/a²),\n   dM = ½ρ·Cd_lat·w(x)·|qx|·qx·x dx,对 x∈[-a,a] 积分:\n       M = -(4/15)·ρ·Cd_lat·b·a⁴·q|q|\n   (∫₀^a √(1-x²/a²)·x³ dx = (2/15)a⁴)\n4. 小线性角阻尼(粘性/蒙皮摩擦),防止纯二次阻尼在小角速度下欠阻尼。\n\n[假设] 侧向阻力合力作用于浮心(忽略横流压心偏移产生的力矩)\n/ 不稳定的 Munk 力矩已由附加质量 Coriolis 项 C_A(ν_r) 精确给出,此处不重复;\n  压心偏移残差相对 Munk 力矩为小量\n/ 安装大尾翼(显著改变压心)时需补充尾翼气动模型。\n\n[假设] 平动阻力与转动阻尼解耦(平动用合速度、转动用纯旋转条带积分,交叉项忽略)\n/ 误差在平动+旋转耦合剧烈时(快速转弯)~20% / 精细机动仿真需完整条带积分。\n\"\"\"\nfrom __future__ import annotations\n\nimport numpy as np\n\nfrom .config import AeroConfig, FinConfig, HullConfig\n\n\nclass AeroModel:\n    def __init__(self, hull: HullConfig, cfg: AeroConfig, fins: FinConfig | None = None):\n        self._cd_axial = cfg.cd_axial\n        self._cd_lateral = cfg.cd_lateral\n        self._a_cross_m2 = hull.cross_area_m2\n        self._a_side_m2 = hull.side_area_m2\n        # 条带理论横流转动阻尼系数(乘 ρ·q|q| 即为力矩)\n        self._c_ang_quad_m5 = (4.0 / 15.0) * cfg.cd_lateral * hull.b_m * hull.a_m**4\n        self._c_lin_Nms = np.array([\n            cfg.c_ang_lin_roll_Nms, cfg.c_ang_lin_pitch_Nms, cfg.c_ang_lin_yaw_Nms])\n        self._fins = fins if (fins is not None and fins.enabled) else None\n\n    def forces_moments(self, nu_r: np.ndarray, rho_kg_m3: float) -> tuple[np.ndarray, np.ndarray]:\n        \"\"\"输入气流相对速度 ν_r = [u,v,w,p,q,r](体轴),返回 (F_body_N, M_body_Nm)。\"\"\"\n        u, v, w = nu_r[0:3]\n        omega = nu_r[3:6]\n\n        f = np.empty(3)\n        f[0] = -0.5 * rho_kg_m3 * self._cd_axial * self._a_cross_m2 * abs(u) * u\n        v_yz = np.hypot(v, w)\n        c_lat = -0.5 * rho_kg_m3 * self._cd_lateral * self._a_side_m2 * v_yz\n        f[1] = c_lat * v\n        f[2] = c_lat * w\n\n        m = -rho_kg_m3 * self._c_ang_quad_m5 * np.abs(omega) * omega\n        m[0] = 0.0  # 横流条带阻尼对滚转无贡献(旋成体),滚转只有下面的线性项\n        m -= self._c_lin_Nms * omega\n\n        # 尾翼(见 FinConfig):线性升力线,局部来流角含转动分量(自然提供俯仰/偏航阻尼)\n        if self._fins is not None:\n            fc = self._fins\n            x_f = fc.x_fin_m\n            q_rate, r_rate = omega[1], omega[2]\n            # 尾翼处局部横向气流速度:v_loc = v + r·x_f(偏航面), w_loc = w - q·x_f(俯仰面)\n            v_loc = v + r_rate * x_f\n            w_loc = w - q_rate * x_f\n            c_fin = 0.5 * rho_kg_m3 * fc.cl_alpha_per_rad * fc.s_plane_m2 * abs(u)\n            f_y_fin = -c_fin * v_loc   # 垂直尾翼对侧滑的恢复侧力\n            f_z_fin = -c_fin * w_loc   # 水平尾翼对攻角的恢复法向力\n            f[1] += f_y_fin\n            f[2] += f_z_fin\n            # 力矩 r×F,r = (x_f, 0, 0)\n            m[1] += -x_f * f_z_fin\n            m[2] += x_f * f_y_fin\n        return f, m\n", "dynamics": "\"\"\"6DOF 刚体动力学(含附加质量),RK4 积分。\n\n公式体系(Fossen, Handbook of Marine Craft Hydrodynamics, 2011, ch.3/6-8;\n该体系是浮空器/水下航行器的标准建模方法,附加质量与刚体项统一处理):\n\n- 动力学参考点 = 浮心 CB(椭球几何中心):附加质量张量在该点为对角阵。\n- 广义速度 ν = [u,v,w,p,q,r](体轴系,CB 点线速度 + 角速度)。\n- 刚体质量矩阵(重心偏移 r_g 用 Steiner 耦合项表达):\n      M_RB = [[ m·I₃,      -m·S(r_g)],\n              [ m·S(r_g),   I_cb    ]]\n- 附加质量 M_A = ρ_air · diag(Lamb)(见 added_mass.py),随当地密度实时缩放。\n- 科氏/向心矩阵取对称矩阵 M 的标准参数化(Fossen eq.3.46):\n      C(ν) = [[0₃,     -S(M₁₁v₁+M₁₂v₂)],\n              [-S(M₁₁v₁+M₁₂v₂), -S(M₂₁v₁+M₂₂v₂)]]\n  注:C_A(ν_r) 的交叉项自动给出 Munk 失稳力矩 (k2-k1)·ρV·u·w 等,无需单独建模。\n- 风(等效海流处理,Fossen ch.8):令体轴系风速 ν_c = [Rᵀ·w_ned; 0],\n  气流相对速度 ν_r = ν - ν_c。动力学方程:\n      M_RB·ν̇ + C_RB(ν)·ν + M_A·ν̇_r + C_A(ν_r)·ν_r = τ_grav + τ_buoy + τ_thrust + τ_aero(ν_r)\n  其中世界系常值风满足 ν̇_c = [-ω×(Rᵀw_ned); 0],移项后对 ν̇ 求解。\n  [假设] 计算 ν̇_c 时忽略风场自身的时间/空间变化率(∂w/∂t≈0)\n  / 常值风下严格成立;湍流频率 <1Hz、幅值 <1m/s 时该项 ≪ 阻力项\n  / 强阵风前沿(风速秒级突变)时低估瞬态载荷。\n\n状态向量 x (16,):\n  [0:3]   p_ned_m        位置(世界系 NED)\n  [3:7]   q (w,x,y,z)    姿态四元数(体→世界)\n  [7:10]  v_body_m_s     CB 点线速度(体轴系)\n  [10:13] omega_rad_s    角速度(体轴系)\n  [13:16] thrust_N       电机实际推力 [左, 右, 垂直](一阶执行器状态,随 RK4 一起积分)\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\n\nfrom .added_mass import added_mass_matrix_unit_rho\nfrom .aero import AeroModel\nfrom .atmosphere import Atmosphere\nfrom .config import GRAVITY_M_S2, SimConfig\nfrom .math3d import (cross3, quat_derivative, quat_normalize,\n                     quat_to_rotmat, skew)\n\nSTATE_DIM = 16\nIDX_POS = slice(0, 3)\nIDX_QUAT = slice(3, 7)\nIDX_VEL = slice(7, 10)\nIDX_OMEGA = slice(10, 13)\nIDX_THRUST = slice(13, 16)\n\n\n@dataclass\nclass MassProperties:\n    m_total_kg: float\n    m_helium_kg: float\n    r_g_b_m: np.ndarray          # 重心相对浮心位置(体轴系);默认配置下 ≈ (0,0,0.40)\n    inertia_cb_kg_m2: np.ndarray  # 刚体惯量张量(关于浮心)\n    M_RB: np.ndarray             # 6×6 刚体质量矩阵(关于浮心)\n    M_A_unit_rho: np.ndarray     # 6×6 附加质量矩阵 / ρ\n\n\ndef build_mass_properties(cfg: SimConfig,\n                          m_helium_kg: float | None = None) -> MassProperties:\n    \"\"\"m_helium_kg 缺省由配置密度×体积得出;氦气热力学开启时由外部传入实时值。\"\"\"\n    hull, mass = cfg.hull, cfg.mass\n    a, b = hull.a_m, hull.b_m\n    v_m3 = hull.volume_m3\n    m_env = mass.m_envelope_kg\n    m_he = m_helium_kg if m_helium_kg is not None else mass.rho_helium_kg_m3 * v_m3\n    m_gon = mass.m_gondola_kg\n    m_total = m_env + m_he + m_gon\n    r_gon = np.array(mass.r_gondola_b_m)\n\n    # 重心(蒙皮与氦气质心在浮心,见 MassConfig 的 [假设])\n    r_g = m_gon * r_gon / m_total\n\n    # 惯量(关于浮心):\n    # 薄椭球壳 ≈ 实心椭球公式 × 5/3(球的壳/实心比 (2/3)/(2/5),推广到椭球)\n    i_env = np.diag([2.0 / 3.0 * m_env * b**2,\n                     1.0 / 3.0 * m_env * (a**2 + b**2),\n                     1.0 / 3.0 * m_env * (a**2 + b**2)])\n    # 氦气:均匀实心椭球\n    i_he = np.diag([2.0 / 5.0 * m_he * b**2,\n                    1.0 / 5.0 * m_he * (a**2 + b**2),\n                    1.0 / 5.0 * m_he * (a**2 + b**2)])\n    # 吊舱:质点,平行轴定理\n    i_gon = m_gon * (np.dot(r_gon, r_gon) * np.eye(3) - np.outer(r_gon, r_gon))\n    i_cb = i_env + i_he + i_gon\n\n    m_rb = np.zeros((6, 6))\n    m_rb[0:3, 0:3] = m_total * np.eye(3)\n    m_rb[0:3, 3:6] = -m_total * skew(r_g)\n    m_rb[3:6, 0:3] = m_total * skew(r_g)\n    m_rb[3:6, 3:6] = i_cb\n\n    return MassProperties(\n        m_total_kg=m_total,\n        m_helium_kg=m_he,\n        r_g_b_m=r_g,\n        inertia_cb_kg_m2=i_cb,\n        M_RB=m_rb,\n        M_A_unit_rho=added_mass_matrix_unit_rho(a, b),\n    )\n\n\ndef coriolis_times_nu(M: np.ndarray, nu: np.ndarray, nu_in: np.ndarray) -> np.ndarray:\n    \"\"\"计算 C(ν)·ν_in,C 由对称质量矩阵 M 与速度 ν 按 Fossen eq.3.46 构造。\n\n    常规使用时 nu_in = nu;分开传参便于复用。\n    \"\"\"\n    v1, v2 = nu[0:3], nu[3:6]\n    s_a = skew(M[0:3, 0:3] @ v1 + M[0:3, 3:6] @ v2)\n    s_b = skew(M[3:6, 0:3] @ v1 + M[3:6, 3:6] @ v2)\n    out = np.empty(6)\n    out[0:3] = -s_a @ nu_in[3:6]\n    out[3:6] = -s_a @ nu_in[0:3] - s_b @ nu_in[3:6]\n    return out\n\n\nclass AirshipDynamics:\n    \"\"\"连续动力学 f(x, u, t) 与 RK4 步进。无任何渲染/控制逻辑。\"\"\"\n\n    def __init__(self, cfg: SimConfig, atmosphere: Atmosphere):\n        self.cfg = cfg\n        self.props = build_mass_properties(cfg)\n        self.aero = AeroModel(cfg.hull, cfg.aero, cfg.fins)\n        self.atmosphere = atmosphere\n        act = cfg.actuator\n        # 电机位置(体轴系,相对浮心):左、右、垂直\n        self._r_motors = np.array([\n            [0.0, -act.motor_sep_y_m, act.motor_z_b_m],\n            [0.0, +act.motor_sep_y_m, act.motor_z_b_m],\n            [0.0, 0.0, act.motor_z_b_m],\n        ])\n        self._thrust_min_N = -act.thrust_max_N if act.reversible else 0.0\n        self._thrust_max_N = act.thrust_max_N\n        self._tau_s = act.tau_s\n        self._volume_m3 = cfg.hull.volume_m3\n        self._minv_rho_key: float | None = None\n        self._minv: np.ndarray | None = None\n\n    def set_helium_mass(self, m_helium_kg: float) -> None:\n        \"\"\"氦气热力学(superheat 排气)实时更新质量属性。\"\"\"\n        self.props = build_mass_properties(self.cfg, m_helium_kg=m_helium_kg)\n        self._minv_rho_key = None   # 质量变化 → 缓存失效\n\n    def _mass_matrix_inv(self, rho_kg_m3: float) -> np.ndarray:\n        \"\"\"(M_RB + ρ·M_A/ρ)⁻¹,按密度缓存。\n\n        密度量化到 4 位有效数字(相对 1e-4):悬停高度变化引起的 ρ 微变不触发重算,\n        引入的质量矩阵误差 ≤0.01%,远小于气动系数 ±30% 的模型不确定度;\n        浮力等力项仍用精确 ρ。\n        \"\"\"\n        key = float(f\"{rho_kg_m3:.4e}\")\n        if key != self._minv_rho_key:\n            self._minv_rho_key = key\n            self._minv = np.linalg.inv(self.props.M_RB + key * self.props.M_A_unit_rho)\n        return self._minv\n\n    def initial_state(self, p_ned_m=(0.0, 0.0, 0.0), q=(1.0, 0.0, 0.0, 0.0)) -> np.ndarray:\n        x = np.zeros(STATE_DIM)\n        x[IDX_POS] = p_ned_m\n        x[IDX_QUAT] = q\n        return x\n\n    def clamp_command(self, cmd_N: np.ndarray) -> np.ndarray:\n        return np.clip(cmd_N, self._thrust_min_N, self._thrust_max_N)\n\n    def derivatives(self, x: np.ndarray, cmd_N: np.ndarray, t_s: float) -> np.ndarray:\n        p = x[IDX_POS]\n        q = quat_normalize(x[IDX_QUAT])\n        nu = np.concatenate([x[IDX_VEL], x[IDX_OMEGA]])\n        thrust_N = x[IDX_THRUST]\n\n        atm = self.atmosphere.get_state(p, t_s)\n        rho = atm.rho_kg_m3\n        R = quat_to_rotmat(q)\n        pr = self.props\n\n        # 风:世界系 → 体轴系,气流相对速度\n        wind_b = R.T @ atm.wind_ned_m_s\n        nu_c = np.concatenate([wind_b, np.zeros(3)])\n        nu_r = nu - nu_c\n\n        # ---- 广义外力(关于浮心,体轴系) ----\n        tau = np.zeros(6)\n        # 重力(作用在重心)\n        f_grav_b = R.T @ np.array([0.0, 0.0, pr.m_total_kg * GRAVITY_M_S2])\n        tau[0:3] += f_grav_b\n        tau[3:6] += cross3(pr.r_g_b_m, f_grav_b)\n        # 浮力(作用在浮心,当地密度实时计算)\n        f_buoy_b = R.T @ np.array([0.0, 0.0, -rho * self._volume_m3 * GRAVITY_M_S2])\n        tau[0:3] += f_buoy_b\n        # 推力:左右电机沿 +x,垂直电机推力为正时沿 -z(向上)\n        f_motors_b = np.array([\n            [thrust_N[0], 0.0, 0.0],\n            [thrust_N[1], 0.0, 0.0],\n            [0.0, 0.0, -thrust_N[2]],\n        ])\n        for r_m, f_m in zip(self._r_motors, f_motors_b):\n            tau[0:3] += f_m\n            tau[3:6] += cross3(r_m, f_m)\n        # 气动阻力与转动阻尼(用气流相对速度)\n        f_aero, m_aero = self.aero.forces_moments(nu_r, rho)\n        tau[0:3] += f_aero\n        tau[3:6] += m_aero\n\n        # ---- 质量矩阵与科氏项 ----\n        M_A = rho * pr.M_A_unit_rho\n        rhs = tau - coriolis_times_nu(pr.M_RB, nu, nu) - coriolis_times_nu(M_A, nu_r, nu_r)\n        # 常值世界风的 ν̇_c 修正项(见模块 docstring)\n        dnu_c = np.concatenate([-cross3(nu[3:6], wind_b), np.zeros(3)])\n        rhs += M_A @ dnu_c\n        nu_dot = self._mass_matrix_inv(rho) @ rhs\n\n        # ---- 运动学与执行器 ----\n        dx = np.empty(STATE_DIM)\n        dx[IDX_POS] = R @ nu[0:3]\n        dx[IDX_QUAT] = quat_derivative(q, nu[3:6])\n        dx[IDX_VEL] = nu_dot[0:3]\n        dx[IDX_OMEGA] = nu_dot[3:6]\n        # 电机一阶响应:τ·Ḟ = F_cmd - F(指令先经饱和限幅)\n        dx[IDX_THRUST] = (self.clamp_command(cmd_N) - thrust_N) / self._tau_s\n        return dx\n\n    def step_rk4(self, x: np.ndarray, cmd_N: np.ndarray, t_s: float, dt_s: float) -> np.ndarray:\n        \"\"\"单步 RK4(指令在步内保持零阶保持,与 50Hz 控制/1ms 物理的时序一致)。\"\"\"\n        k1 = self.derivatives(x, cmd_N, t_s)\n        k2 = self.derivatives(x + 0.5 * dt_s * k1, cmd_N, t_s + 0.5 * dt_s)\n        k3 = self.derivatives(x + 0.5 * dt_s * k2, cmd_N, t_s + 0.5 * dt_s)\n        k4 = self.derivatives(x + dt_s * k3, cmd_N, t_s + dt_s)\n        x_next = x + (dt_s / 6.0) * (k1 + 2 * k2 + 2 * k3 + k4)\n        x_next[IDX_QUAT] = quat_normalize(x_next[IDX_QUAT])\n        return x_next\n\n    # ---- 能量(单元测试用:无阻力/无推力/无风时应守恒) ----\n    def mechanical_energy_J(self, x: np.ndarray) -> float:\n        \"\"\"动能(含附加质量) + 重力势能 + 浮力势能。\n\n        z 向下:重力 F_z=+mg → U_grav = -m·g·z_cg;浮力 F_z=-ρVg → U_buoy = +ρVg·z_cb。\n        仅在常密度大气下守恒(无阻力/推力/风时,单元测试用)。\n        \"\"\"\n        q = quat_normalize(x[IDX_QUAT])\n        nu = np.concatenate([x[IDX_VEL], x[IDX_OMEGA]])\n        atm = self.atmosphere.get_state(x[IDX_POS], 0.0)\n        M = self.props.M_RB + atm.rho_kg_m3 * self.props.M_A_unit_rho\n        ke = 0.5 * nu @ M @ nu\n        R = quat_to_rotmat(q)\n        z_cg = x[IDX_POS][2] + (R @ self.props.r_g_b_m)[2]\n        pe_grav = -self.props.m_total_kg * GRAVITY_M_S2 * z_cg\n        pe_buoy = atm.rho_kg_m3 * self._volume_m3 * GRAVITY_M_S2 * x[IDX_POS][2]\n        return float(ke + pe_grav + pe_buoy)\n", "sensors": "\"\"\"传感器模型(模拟 ESP32 + IMU + BMP390):噪声 + 采样率限制。\n\n采样调度由 simulation.py 按整数物理 tick 触发(IMU 100Hz、气压计 10Hz),\n本模块只负责\"给定真值 → 生成一次带噪测量\"。每类传感器使用独立的派生 RNG 流,\n保证逐位可复现且互不串扰。\n\n[假设] 各传感器噪声为零均值高斯白噪声,无偏置漂移/温漂/延迟\n/ 短时(分钟级)仿真中漂移项贡献小于白噪声 / 长航时或温度剧变场景需加入\n  偏置随机游走与一阶延迟。\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport numpy as np\n\nfrom .config import SensorConfig\nfrom .dynamics import IDX_OMEGA, IDX_POS, IDX_QUAT, IDX_VEL\nfrom .math3d import quat_to_euler\n\n\n@dataclass\nclass Measurements:\n    \"\"\"控制器可见的最新测量值(各自在采样时刻更新,期间保持)。\"\"\"\n    altitude_m: float = 0.0          # 气压计高度(向上为正,= -z + 噪声)\n    roll_rad: float = 0.0\n    pitch_rad: float = 0.0\n    yaw_rad: float = 0.0\n    gyro_rad_s: np.ndarray = field(default_factory=lambda: np.zeros(3))\n    u_body_m_s: float = 0.0          # 前向速度估计\n    t_imu_s: float = -1.0            # 最近一次更新时刻(调试/绘图用)\n    t_baro_s: float = -1.0\n\n\nclass SensorSuite:\n    def __init__(self, cfg: SensorConfig, rng_root: np.random.Generator):\n        self.cfg = cfg\n        # 独立子流:增删某一传感器不影响其他传感器的随机序列\n        child = rng_root.spawn(3)\n        self._rng_imu, self._rng_baro, self._rng_vel = child\n        self.meas = Measurements()\n\n    def sample_imu(self, x: np.ndarray, t_s: float) -> None:\n        \"\"\"100Hz:姿态角 + 角速度 + 前向速度估计(见 SensorConfig 的 [假设])。\"\"\"\n        roll, pitch, yaw = quat_to_euler(x[IDX_QUAT])\n        n = self.cfg.att_noise_std_rad\n        self.meas.roll_rad = roll + self._rng_imu.normal(0.0, n)\n        self.meas.pitch_rad = pitch + self._rng_imu.normal(0.0, n)\n        self.meas.yaw_rad = yaw + self._rng_imu.normal(0.0, n)\n        self.meas.gyro_rad_s = x[IDX_OMEGA] + self._rng_imu.normal(\n            0.0, self.cfg.gyro_noise_std_rad_s, 3)\n        self.meas.u_body_m_s = float(\n            x[IDX_VEL][0] + self._rng_vel.normal(0.0, self.cfg.vel_noise_std_m_s))\n        self.meas.t_imu_s = t_s\n\n    def sample_baro(self, x: np.ndarray, t_s: float) -> None:\n        \"\"\"10Hz,σ=0.05m(2σ≈±0.1m,BMP390 量级)。\"\"\"\n        alt_true_m = -x[IDX_POS][2]\n        self.meas.altitude_m = alt_true_m + self._rng_baro.normal(\n            0.0, self.cfg.baro_noise_std_m)\n        self.meas.t_baro_s = t_s\n", "controller": "\"\"\"串级 PID 控制器(50Hz,与物理步长分离)。\n\n结构:\n  外环(可选,位置保持):水平位置误差 → 航向设定 + 前向速度设定\n  高度通道: 气压计高度 → PID → 垂直推力 [N]\n  偏航通道: 航向角(含角度卷绕) → PID → 偏航力矩 [N·m] → 左右差速\n  前速通道: 前向速度 → PI → 总前向推力 [N]\n\n混控(电机几何见 dynamics:右推产生负偏航力矩):\n  τ_z = d·(F_L - F_R)  →  F_L = F_fwd/2 + τ_cmd/(2d),F_R = F_fwd/2 - τ_cmd/(2d)\n\nPID 实现要点:\n- 微分项作用在测量值上(derivative-on-measurement)并带一阶低通,避免设定值阶跃踢\n- 抗积分饱和:输出钳位 + 条件积分(输出饱和且误差同向时停止积分)\n- 高度测量 10Hz 且噪声大,微分低通时间常数取 1s(见 ControlConfig)\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport numpy as np\n\nfrom .config import ControlConfig, PidGains\nfrom .math3d import wrap_angle_rad\nfrom .sensors import Measurements\n\n\nclass Pid:\n    def __init__(self, g: PidGains):\n        self.g = g\n        self.reset()\n\n    def reset(self) -> None:\n        self._integral = 0.0\n        self._d_filt = 0.0\n        self._prev_meas: float | None = None\n        self._meas_filt: float | None = None\n\n    def update(self, setpoint: float, meas_raw: float, dt_s: float,\n               error_override: float | None = None, ff: float = 0.0) -> float:\n        \"\"\"error_override 用于角度通道传入卷绕后的误差(此时跳过测量滤波,由调用方处理);\n        ff 为前馈项(参与饱和/抗积分判断)。\"\"\"\n        g = self.g\n        # 测量低通(见 PidGains.tau_meas_s 注释)\n        if g.tau_meas_s > 0:\n            if self._meas_filt is None:\n                self._meas_filt = meas_raw\n            a_m = dt_s / (g.tau_meas_s + dt_s)\n            self._meas_filt += a_m * (meas_raw - self._meas_filt)\n            meas = self._meas_filt\n        else:\n            meas = meas_raw\n        err = error_override if error_override is not None else (setpoint - meas)\n\n        # 微分(对测量,一阶低通)\n        if self._prev_meas is None:\n            d_meas = 0.0\n        else:\n            delta = meas - self._prev_meas\n            if error_override is not None:\n                # 角度通道(偏航):按最短弧计算变化率,避免航向穿越 ±π 时\n                # 原始角度跳变 ~2π 被微分放大成假角速度、把偏航舵反向打满。\n                delta = wrap_angle_rad(delta)\n            d_meas = delta / dt_s\n        self._prev_meas = meas\n        alpha = dt_s / (g.tau_d_s + dt_s) if g.tau_d_s > 0 else 1.0\n        self._d_filt += alpha * (d_meas - self._d_filt)\n\n        out_unsat = ff + g.kp * err + self._integral - g.kd * self._d_filt\n        out = float(np.clip(out_unsat, g.out_min, g.out_max))\n        # 条件积分抗饱和 + 积分分离(见 PidGains.i_band 注释)\n        saturated = out != out_unsat\n        windup_block = saturated and (out_unsat - out) * err > 0\n        outside_band = g.i_band > 0 and abs(err) > g.i_band\n        if not (windup_block or outside_band):\n            self._integral += g.ki * err * dt_s\n            self._integral = float(np.clip(self._integral, g.out_min, g.out_max))\n        return out\n\n    @property\n    def integral(self) -> float:\n        return self._integral\n\n\n@dataclass\nclass Setpoints:\n    altitude_m: float = 0.0\n    yaw_rad: float = 0.0\n    speed_m_s: float = 0.0\n    # 位置保持模式:目标水平位置(NED 北/东),启用后覆盖 yaw/speed 设定\n    pos_hold: bool = False\n    target_n_m: float = 0.0\n    target_e_m: float = 0.0\n\n\n@dataclass\nclass MotorCommands:\n    \"\"\"电机推力指令 [N],顺序与 dynamics 状态一致:左、右、垂直。\"\"\"\n    left_N: float = 0.0\n    right_N: float = 0.0\n    vertical_N: float = 0.0\n\n    def as_array(self) -> np.ndarray:\n        return np.array([self.left_N, self.right_N, self.vertical_N])\n\n\n@dataclass\nclass ChannelDebug:\n    \"\"\"遥测用:各通道 设定值/测量值/输出。\"\"\"\n    alt_sp_m: float = 0.0\n    alt_meas_m: float = 0.0\n    alt_out_N: float = 0.0\n    yaw_sp_rad: float = 0.0\n    yaw_meas_rad: float = 0.0\n    yaw_out_Nm: float = 0.0\n    speed_sp_m_s: float = 0.0\n    speed_meas_m_s: float = 0.0\n    speed_out_N: float = 0.0\n\n\nclass CascadeController:\n    def __init__(self, cfg: ControlConfig, motor_sep_y_m: float, thrust_max_N: float):\n        self.cfg = cfg\n        self._d_y_m = motor_sep_y_m\n        self._thrust_max_N = thrust_max_N\n        self.pid_alt = Pid(cfg.alt)\n        self.pid_yaw = Pid(cfg.yaw)\n        self.pid_speed = Pid(cfg.speed)\n        self.setpoints = Setpoints()\n        self.debug = ChannelDebug()\n        self.manual_mode = False\n        self.manual_cmd = MotorCommands()\n        self._pos_hold_yaw_sp: float | None = None\n\n    def reset(self) -> None:\n        self.pid_alt.reset()\n        self.pid_yaw.reset()\n        self.pid_speed.reset()\n        self._pos_hold_yaw_sp = None\n\n    def set_gains(self, channel: str, gains: PidGains) -> None:\n        \"\"\"实时改增益(调参面板):保留积分状态,只换系数。\"\"\"\n        pid = {\"alt\": self.pid_alt, \"yaw\": self.pid_yaw, \"speed\": self.pid_speed}[channel]\n        pid.g = gains\n\n    def update(self, meas: Measurements, pos_ned_m: np.ndarray, dt_s: float) -> MotorCommands:\n        \"\"\"pos_ned_m 仅位置保持外环使用([假设] 水平位置由外部定位系统提供,\n        无噪声 / 外环带宽低(<0.05Hz),定位噪声影响小 / 纯惯性导航时不可用)。\"\"\"\n        if self.manual_mode:\n            return self.manual_cmd\n\n        sp = self.setpoints\n        yaw_sp = sp.yaw_rad\n        speed_sp = sp.speed_m_s\n        if sp.pos_hold:\n            dn = sp.target_n_m - pos_ned_m[0]\n            de = sp.target_e_m - pos_ned_m[1]\n            dist = float(np.hypot(dn, de))\n            # 航向设定:仅当位置误差超出死区时刷新指向目标的方位角;死区内保持\n            # 上一次设定不变。若每拍跟随方位角,在目标附近方位角随微小位移翻转,\n            # 航向来回急甩并积累侧向速度(常值风下实测发散)。\n            if self._pos_hold_yaw_sp is None:\n                self._pos_hold_yaw_sp = meas.yaw_rad\n            if dist > self.cfg.pos_hold_deadband_m:\n                bearing = float(np.arctan2(de, dn))\n                # 速率限制地转向目标方位(见 pos_hold_yaw_rate_max_rad_s 注释)\n                d_yaw = wrap_angle_rad(bearing - self._pos_hold_yaw_sp)\n                max_step = self.cfg.pos_hold_yaw_rate_max_rad_s * dt_s\n                self._pos_hold_yaw_sp = wrap_angle_rad(\n                    self._pos_hold_yaw_sp + float(np.clip(d_yaw, -max_step, max_step)))\n            yaw_sp = self._pos_hold_yaw_sp\n            # 前速设定 = 期望地速矢量(P 外环,限幅)在当前航向上的投影。\n            # 可为负(电机反转倒车):目标在身后小距离时不调头,顶风保持时尤为重要。\n            v_max = self.cfg.pos_hold_max_speed_m_s\n            v_des_n = self.cfg.pos_hold_kp_1_s * dn\n            v_des_e = self.cfg.pos_hold_kp_1_s * de\n            v_norm = float(np.hypot(v_des_n, v_des_e))\n            if v_norm > v_max:\n                v_des_n *= v_max / v_norm\n                v_des_e *= v_max / v_norm\n            speed_sp = float(v_des_n * np.cos(meas.yaw_rad)\n                             + v_des_e * np.sin(meas.yaw_rad))\n\n        # 高度(PID + 悬停油门前馈,前馈在 PID 内部参与饱和与抗积分判断)\n        f_vert = self.pid_alt.update(sp.altitude_m, meas.altitude_m, dt_s,\n                                     ff=self.cfg.alt_ff_N)\n        # 偏航(角度卷绕)\n        yaw_err = wrap_angle_rad(yaw_sp - meas.yaw_rad)\n        tau_z = self.pid_yaw.update(yaw_sp, meas.yaw_rad, dt_s, error_override=yaw_err)\n        # 前速\n        f_fwd = self.pid_speed.update(speed_sp, meas.u_body_m_s, dt_s)\n\n        f_left = f_fwd / 2.0 + tau_z / (2.0 * self._d_y_m)\n        f_right = f_fwd / 2.0 - tau_z / (2.0 * self._d_y_m)\n        m = self._thrust_max_N\n        cmd = MotorCommands(\n            left_N=float(np.clip(f_left, -m, m)),\n            right_N=float(np.clip(f_right, -m, m)),\n            vertical_N=float(np.clip(f_vert, -m, m)),\n        )\n\n        d = self.debug\n        d.alt_sp_m, d.alt_meas_m, d.alt_out_N = sp.altitude_m, meas.altitude_m, cmd.vertical_N\n        d.yaw_sp_rad, d.yaw_meas_rad, d.yaw_out_Nm = yaw_sp, meas.yaw_rad, tau_z\n        d.speed_sp_m_s, d.speed_meas_m_s, d.speed_out_N = speed_sp, meas.u_body_m_s, f_fwd\n        return cmd\n", "atmosphere": "\"\"\"大气模块 — 统一接口与各模型实现。\n\n物理引擎只通过 Atmosphere.get_state(position, time) 取大气数据,\n保证可整体替换(constant ↔ ISA 分层风/湍流,将来 ERA5 再分析数据)而不改动力学代码。\n\n实现:\n  ConstantAtmosphere — 常密度 + 常值风(室内/单元测试)\n  IsaAtmosphere      — ISA 0~32km 剖面 + 分层风(线性插值) + Gauss-Markov 湍流 + 1-cos 阵风\n\n== ISA 标准大气(ISO 2533 / US Standard Atmosphere 1976,0~32km 三层) ==\n  0~11 km   对流层:   T = 288.15 − 6.5e-3·h,   p 按多方关系\n  11~20 km  平流层底等温层: T = 216.65,        p 按指数律\n  20~32 km  平流层升温段:  T = 216.65 + 1.0e-3·(h−20000)\n  ρ = p / (R_air·(T + ΔT)),R_air = 287.05287 J/(kg·K)\n  (ΔT 温度偏移见 AtmosphereConfig 注释)\n\n== 湍流模型 ==\n[假设] 用一阶 Gauss-Markov 过程近似 Dryden 谱(纵向分量谱形同构,横/竖向二阶谱\n  简化为一阶):x_{k+1} = x_k·e^{−Δt/τ} + σ√(1−e^{−2Δt/τ})·N(0,1),τ = L/V\n/ 方差与积分时间尺度与 Dryden 一致,仅高频谱斜率略缓\n/ 需要精确谱响应(结构载荷/抖振分析)时换完整 Dryden 成形滤波器。\n强度 σ 与尺度 L 随高度变化(地面边界层强、平流层平稳),剖面见 _TURB_PROFILE,\n参考 MIL-HDBK-1797 低空模型量级,系数为工程估值并随 turbulence_intensity 整体缩放。\n[假设] 湍流分量在(沿平均风、横风、垂直)风轴系生成后转到 NED;冻结湍流假设,\n  以平均风速(下限 0.5m/s)作为对流速度 / 悬停低速下合理 / 高速穿越湍流场时需用空速。\n\n== 阵风 ==\n1-cosine 脉冲:v(t) = A/2·(1−cos(2π(t−t₀)/T)),t∈[t₀, t₀+T],水平方向可配,\n多个阵风事件叠加。可手动触发(trigger_gust)或随机触发(可配平均间隔)。\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport numpy as np\n\nfrom .config import AtmosphereConfig\n\nR_AIR_J_KGK = 287.05287\nG0_M_S2 = 9.80665\n\n# ISA 各层:(底高度 m, 底温度 K, 温度梯度 K/m, 底压力 Pa)\n_T0_K, _P0_PA = 288.15, 101325.0\n_ISA_LAYERS = []\n\n\ndef _build_isa_layers():\n    layers = []\n    h_b, t_b, p_b = 0.0, _T0_K, _P0_PA\n    for h_top, lapse in ((11000.0, -6.5e-3), (20000.0, 0.0), (32000.0, 1.0e-3)):\n        layers.append((h_b, t_b, lapse, p_b))\n        dh = h_top - h_b\n        if lapse == 0.0:\n            p_top = p_b * np.exp(-G0_M_S2 * dh / (R_AIR_J_KGK * t_b))\n        else:\n            p_top = p_b * ((t_b + lapse * dh) / t_b) ** (-G0_M_S2 / (R_AIR_J_KGK * lapse))\n        h_b, t_b, p_b = h_top, t_b + lapse * dh, p_top\n    return layers\n\n\n_ISA_LAYERS = _build_isa_layers()\n\n\ndef isa_state(alt_m: float, dT_K: float = 0.0) -> tuple[float, float, float]:\n    \"\"\"ISA 剖面:位势海拔 → (温度 K, 气压 Pa, 密度 kg/m³)。范围 0~32km,超界钳位。\n\n    [假设] 输入按位势高度处理(ISA 分层与标准表按位势高度定义),\n    不做几何高度→位势高度换算(H = z·Re/(Re+z))\n    / 25km 处两者差 ~100m,密度差 ~0.4%;低空(<2km)差 <0.03% 可忽略\n    / 与按几何高度索引的表格对照、或 30km 级任务精算时需先换算。\n    \"\"\"\n    h = float(np.clip(alt_m, 0.0, 32000.0))\n    for h_b, t_b, lapse, p_b in reversed(_ISA_LAYERS):\n        if h >= h_b:\n            break\n    dh = h - h_b\n    if lapse == 0.0:\n        t = t_b\n        p = p_b * np.exp(-G0_M_S2 * dh / (R_AIR_J_KGK * t_b))\n    else:\n        t = t_b + lapse * dh\n        p = p_b * (t / t_b) ** (-G0_M_S2 / (R_AIR_J_KGK * lapse))\n    t_eff = t + dT_K\n    rho = p / (R_AIR_J_KGK * t_eff)\n    return float(t_eff), float(p), float(rho)\n\n\n@dataclass\nclass AtmosphereState:\n    \"\"\"某一点、某一时刻的大气状态(SI)。\"\"\"\n    rho_kg_m3: float\n    temperature_K: float\n    pressure_Pa: float\n    wind_ned_m_s: np.ndarray         # 风矢量(世界系 NED,含湍流与阵风分量)\n\n\nclass Atmosphere:\n    \"\"\"大气模型基类/接口。\"\"\"\n\n    def get_state(self, position_ned_m: np.ndarray, time_s: float) -> AtmosphereState:\n        raise NotImplementedError\n\n    def set_uniform_wind(self, wind_ned_m_s) -> None:\n        raise NotImplementedError\n\n    def reset(self) -> None:\n        \"\"\"仿真重置时清除内部时变状态(湍流/阵风),无状态模型为 no-op。\"\"\"\n\n\nclass ConstantAtmosphere(Atmosphere):\n    \"\"\"常密度、常温压、常值风。适用于室内场景与单元测试。\n\n    [假设] 室内空气密度均匀恒定 / 室内 0~5m 高差密度变化 <0.06%,可忽略\n    / 户外或高空场景失效,届时用 IsaAtmosphere。\n    \"\"\"\n\n    def __init__(self, cfg: AtmosphereConfig):\n        self._rho_kg_m3 = cfg.rho_const_kg_m3\n        self._temperature_K = cfg.temperature_const_K\n        self._pressure_Pa = cfg.pressure_const_Pa\n        self._wind_ned_m_s = np.array(cfg.wind_ned_m_s, dtype=float)\n\n    def get_state(self, position_ned_m: np.ndarray, time_s: float) -> AtmosphereState:\n        return AtmosphereState(\n            rho_kg_m3=self._rho_kg_m3,\n            temperature_K=self._temperature_K,\n            pressure_Pa=self._pressure_Pa,\n            wind_ned_m_s=self._wind_ned_m_s.copy(),\n        )\n\n    def set_uniform_wind(self, wind_ned_m_s) -> None:\n        self._wind_ned_m_s = np.array(wind_ned_m_s, dtype=float)\n\n\n# 湍流强度/尺度剖面:(海拔 m, σ m/s, L m)。线性插值,见模块 docstring。\n# σ 地面段取 0.1×(6m 高度平均风),无风时下限 0.05;以下为 intensity=1 的基准剖面。\n_TURB_PROFILE = (\n    # alt_m, sigma_base_m_s, L_m\n    (0.0,     0.30,   50.0),    # 地面边界层:机械湍流强\n    (300.0,   0.50,  150.0),\n    (2000.0,  0.50,  300.0),    # 对流层中部\n    (9000.0,  0.70,  500.0),    # 急流附近风切变区\n    (12000.0, 0.50,  500.0),\n    (18000.0, 0.10,  500.0),    # 平流层:平稳\n    (32000.0, 0.05,  500.0),\n)\n\n\n@dataclass\nclass GustEvent:\n    t0_s: float\n    dir_to_deg: float        # 吹向方位角(0=北)\n    amplitude_m_s: float\n    duration_s: float\n\n    def wind_ned(self, t_s: float) -> np.ndarray:\n        if not (self.t0_s <= t_s <= self.t0_s + self.duration_s):\n            return np.zeros(3)\n        v = 0.5 * self.amplitude_m_s * (\n            1.0 - np.cos(2.0 * np.pi * (t_s - self.t0_s) / self.duration_s))\n        a = np.deg2rad(self.dir_to_deg)\n        return v * np.array([np.cos(a), np.sin(a), 0.0])\n\n\nclass IsaAtmosphere(Atmosphere):\n    \"\"\"ISA 剖面 + 分层风 + 湍流 + 阵风。参数可运行时修改(调参面板)。\"\"\"\n\n    def __init__(self, cfg: AtmosphereConfig, seed: int = 0):\n        self.cfg = cfg\n        self.dT_K = cfg.dT_K\n        self.ground_alt_m = cfg.ground_alt_m\n        self.turbulence_intensity = cfg.turbulence_intensity\n        self.wind_layers = [list(l) for l in cfg.wind_layers]  # 可变,面板实时改\n        self._seed = seed\n        self._rng = np.random.default_rng(seed)\n        self._gusts: list[GustEvent] = []\n        # 湍流状态(沿风/横风/垂直三分量),固定步长推进、查询间保持\n        self._turb_state = np.zeros(3)\n        self._turb_t_s = 0.0\n        self._dt_turb_s = cfg.turb_update_dt_s\n\n    def reset(self) -> None:\n        \"\"\"清除湍流/阵风状态并重建 RNG,保证 reset 后轨迹与新建实例逐位一致。\"\"\"\n        self._rng = np.random.default_rng(self._seed)\n        self._turb_state[:] = 0.0\n        self._turb_t_s = 0.0\n        self._gusts = []\n\n    # ---- 平均风 ----\n    def wind_mean_ned(self, alt_m: float) -> np.ndarray:\n        if not self.wind_layers:\n            return np.zeros(3)\n        # 按 N/E 分量插值(直接插值方向角在 ±180° 处会绕错方向)\n        alts = [l[0] for l in self.wind_layers]\n        comps = []\n        for _, spd, dir_deg in self.wind_layers:\n            a = np.deg2rad(dir_deg)\n            comps.append((spd * np.cos(a), spd * np.sin(a)))\n        comps = np.array(comps)\n        n = np.interp(alt_m, alts, comps[:, 0])\n        e = np.interp(alt_m, alts, comps[:, 1])\n        return np.array([n, e, 0.0])\n\n    # ---- 湍流 ----\n    def _turb_params(self, alt_m: float) -> tuple[float, float]:\n        prof = np.array(_TURB_PROFILE)\n        sigma = float(np.interp(alt_m, prof[:, 0], prof[:, 1]))\n        L = float(np.interp(alt_m, prof[:, 0], prof[:, 2]))\n        # 地面段 σ 随当地平均风加强(机械湍流):σ = max(基准, 0.1×W6m)\n        if alt_m < 300.0:\n            w6 = float(np.linalg.norm(self.wind_mean_ned(6.0)))\n            sigma = max(sigma, 0.1 * w6)\n        return sigma * self.turbulence_intensity, L\n\n    def _advance_turbulence(self, t_s: float, alt_m: float) -> None:\n        \"\"\"固定步长推进 Gauss-Markov 状态;查询时间早于内部时间则保持(不回退)。\"\"\"\n        while t_s >= self._turb_t_s + self._dt_turb_s:\n            self._turb_t_s += self._dt_turb_s\n            sigma, L = self._turb_params(alt_m)\n            if sigma <= 0.0:\n                self._turb_state[:] = 0.0\n                continue\n            v_adv = max(float(np.linalg.norm(self.wind_mean_ned(alt_m))), 0.5)\n            tau = L / v_adv\n            phi = np.exp(-self._dt_turb_s / tau)\n            q = sigma * np.sqrt(1.0 - phi * phi)\n            self._turb_state = phi * self._turb_state + q * self._rng.standard_normal(3)\n\n    def turbulence_ned(self, alt_m: float) -> np.ndarray:\n        \"\"\"当前湍流分量(风轴系 → NED)。\n\n        [假设] 垂直分量 σ_w = 0.7·σ_u(近地面垂直脉动受地面抑制的典型比值)\n        / 与边界层观测一致 / 强对流(热泡)环境下垂直分量可反超水平分量。\n        \"\"\"\n        if self.turbulence_intensity <= 0.0:\n            return np.zeros(3)\n        mean = self.wind_mean_ned(alt_m)\n        spd = float(np.hypot(mean[0], mean[1]))\n        if spd > 1e-6:\n            ax = mean[:2] / spd          # 沿风单位矢量\n        else:\n            ax = np.array([1.0, 0.0])    # 无风时取北\n        cross = np.array([-ax[1], ax[0]])\n        u, v, w = self._turb_state       # w 向上为正\n        return np.array([u * ax[0] + v * cross[0],\n                         u * ax[1] + v * cross[1],\n                         -0.7 * w])      # NED z 向下\n\n    # ---- 阵风 ----\n    def trigger_gust(self, t_s: float, dir_to_deg: float,\n                     amplitude_m_s: float, duration_s: float = 3.0) -> None:\n        self._gusts.append(GustEvent(t_s, dir_to_deg, amplitude_m_s, duration_s))\n        # 清理已结束事件\n        self._gusts = [g for g in self._gusts if g.t0_s + g.duration_s >= t_s]\n\n    # ---- 接口 ----\n    def get_state(self, position_ned_m: np.ndarray, time_s: float) -> AtmosphereState:\n        alt_m = self.ground_alt_m - float(position_ned_m[2])   # z 向下\n        t_K, p_Pa, rho = isa_state(alt_m, self.dT_K)\n        self._advance_turbulence(time_s, alt_m)\n        wind = self.wind_mean_ned(alt_m) + self.turbulence_ned(alt_m)\n        for g in self._gusts:\n            wind = wind + g.wind_ned(time_s)\n        return AtmosphereState(rho_kg_m3=rho, temperature_K=t_K,\n                               pressure_Pa=p_Pa, wind_ned_m_s=wind)\n\n    def set_uniform_wind(self, wind_ned_m_s) -> None:\n        \"\"\"兼容接口:把所有风层设为同一矢量。\"\"\"\n        w = np.asarray(wind_ned_m_s, dtype=float)\n        spd = float(np.hypot(w[0], w[1]))\n        dir_deg = float(np.rad2deg(np.arctan2(w[1], w[0])))\n        if not self.wind_layers:\n            self.wind_layers = [[0.0, spd, dir_deg]]\n        else:\n            for l in self.wind_layers:\n                l[1], l[2] = spd, dir_deg\n\n\n# ---- 预置风场 ----\ndef wind_layers_low_altitude(speed_10m_m_s: float = 1.5, dir_to_deg: float = 180.0,\n                             alpha: float = 0.14) -> tuple:\n    \"\"\"低空模式(0~100m):幂律边界层 u(h) = u10·(h/10)^α。\n\n    [假设] α=0.14(开阔地面典型;城市 0.25~0.4,水面 0.10)\n    / 中性层结下良好 / 强对流或逆温时剖面显著偏离幂律。\n    \"\"\"\n    layers = []\n    for h in (2.0, 5.0, 10.0, 20.0, 40.0, 70.0, 100.0):\n        layers.append((h, round(speed_10m_m_s * (h / 10.0) ** alpha, 3), dir_to_deg))\n    return tuple(layers)\n\n\ndef wind_layers_high_altitude() -> tuple:\n    \"\"\"高空模式(0~30km):典型中纬度剖面,急流位于 10~12km,平流层风速回落。\n\n    [假设] 风速/风向为中纬度气候平均量级(急流 25m/s),仅作演示初值\n    / 用于联调与定性研究 / 任务级分析必须替换为当地探空或再分析数据。\n    \"\"\"\n    return (\n        (0.0,    3.0, 90.0),\n        (2000.0, 8.0, 100.0),\n        (4000.0, 12.0, 110.0),\n        (7000.0, 18.0, 115.0),\n        (10000.0, 25.0, 120.0),   # 急流\n        (12000.0, 22.0, 120.0),\n        (16000.0, 10.0, 115.0),\n        (20000.0, 6.0, 100.0),\n        (26000.0, 8.0, 80.0),\n        (30000.0, 12.0, 70.0),\n    )\n\n\ndef make_atmosphere(cfg: AtmosphereConfig, seed: int = 0) -> Atmosphere:\n    \"\"\"根据配置构建大气模型。seed 用于湍流(可复现,由 SimConfig.seed 派生)。\"\"\"\n    if cfg.model == \"constant\":\n        return ConstantAtmosphere(cfg)\n    if cfg.model == \"isa\":\n        return IsaAtmosphere(cfg, seed)\n    raise ValueError(f\"unknown atmosphere model: {cfg.model}\")\n", "simulation": "\"\"\"仿真主循环:1ms 物理(RK4) + 50Hz 控制 + 传感器整数倍调度。\n\n所有调度用整数 tick 计数(无浮点时间累积误差):\n  物理   每 1 tick   (dt = 1ms)\n  IMU    每 10 tick  (100 Hz)\n  气压计 每 100 tick (10 Hz)\n  控制   每 20 tick  (50 Hz)\n传感器采样发生在控制更新之前(同一 tick 时先测量后控制)。\n\n可复现性:同一 SimConfig(含 seed)→ 逐位一致轨迹(test_determinism 验证)。\n\"\"\"\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport numpy as np\n\nfrom .atmosphere import Atmosphere, make_atmosphere\nfrom .config import SimConfig\nfrom .controller import CascadeController, MotorCommands\nfrom .dynamics import (IDX_OMEGA, IDX_POS, IDX_QUAT, IDX_THRUST, IDX_VEL,\n                       AirshipDynamics)\nfrom .math3d import quat_to_euler\nfrom .sensors import SensorSuite\n\n\n@dataclass\nclass History:\n    \"\"\"按控制周期(50Hz)记录的时间序列,场景脚本绘图用。\"\"\"\n    t_s: list = field(default_factory=list)\n    pos_ned_m: list = field(default_factory=list)\n    euler_rad: list = field(default_factory=list)       # roll, pitch, yaw(真值)\n    v_body_m_s: list = field(default_factory=list)\n    omega_rad_s: list = field(default_factory=list)\n    thrust_N: list = field(default_factory=list)        # 电机实际推力 [左,右,垂直]\n    cmd_N: list = field(default_factory=list)           # 电机指令\n    alt_meas_m: list = field(default_factory=list)      # 气压计测量(控制器所见)\n    sp: list = field(default_factory=list)              # (alt_sp, yaw_sp, speed_sp)\n    wind_ned_m_s: list = field(default_factory=list)\n\n    def asarray(self) -> dict[str, np.ndarray]:\n        return {k: np.array(v) for k, v in self.__dict__.items()}\n\n\nclass Simulation:\n    def __init__(self, cfg: SimConfig, atmosphere: Atmosphere | None = None):\n        self.cfg = cfg\n        # 大气湍流种子由全局种子派生(+1 偏移,与传感器流区分)\n        self.atmosphere = atmosphere if atmosphere is not None else make_atmosphere(\n            cfg.atmosphere, seed=cfg.seed + 1)\n        self.dynamics = AirshipDynamics(cfg, self.atmosphere)\n        rng_root = np.random.default_rng(cfg.seed)\n        self.sensors = SensorSuite(cfg.sensor, rng_root)\n        self.controller = CascadeController(\n            cfg.control, cfg.actuator.motor_sep_y_m, cfg.actuator.thrust_max_N)\n\n        dt = cfg.dt_physics_s\n        self._ticks_per_imu = max(1, round(1.0 / (cfg.sensor.imu_rate_hz * dt)))\n        self._ticks_per_baro = max(1, round(1.0 / (cfg.sensor.baro_rate_hz * dt)))\n        self._ticks_per_ctrl = max(1, round(1.0 / (cfg.control.rate_hz * dt)))\n        self._dt_ctrl_s = self._ticks_per_ctrl * dt\n\n        self.reset()\n\n    def reset(self, p_ned_m=(0.0, 0.0, 0.0), q=(1.0, 0.0, 0.0, 0.0)) -> None:\n        self.x = self.dynamics.initial_state(p_ned_m, q)\n        self.tick = 0\n        self.cmd = MotorCommands()\n        self.controller.reset()\n        self.history = History()\n        self.atmosphere.reset()\n        self._init_helium(p_ned_m)\n        # 初始测量 = 初始真值(控制器第一拍前已有有效测量)\n        self.sensors.sample_imu(self.x, 0.0)\n        self.sensors.sample_baro(self.x, 0.0)\n        # 初始气压计测量去噪:reset 时刻用真值,避免首拍大误差(只影响第一拍前)\n        self.sensors.meas.altitude_m = -self.x[IDX_POS][2]\n\n    @property\n    def t_s(self) -> float:\n        return self.tick * self.cfg.dt_physics_s\n\n    # ---- 氦气热力学(见 HeliumThermalConfig 注释) ----\n    def _init_helium(self, p_ned_m) -> None:\n        hcfg = self.cfg.helium\n        self.helium_T_K: float | None = None\n        self.helium_m_kg = self.cfg.mass.rho_helium_kg_m3 * self.cfg.hull.volume_m3\n        if not hcfg.enabled:\n            return\n        atm = self.atmosphere.get_state(np.array(p_ned_m, dtype=float), 0.0)\n        self.helium_T_K = atm.temperature_K\n        # 等效气体常数:与配置密度在初始环境下自洽([假设] 见 HeliumThermalConfig)\n        self._R_eff_J_kgK = atm.pressure_Pa / (\n            self.cfg.mass.rho_helium_kg_m3 * atm.temperature_K)\n        hull = self.cfg.hull\n        a, b = hull.a_m, hull.b_m\n        e = np.sqrt(1.0 - (b / a) ** 2)\n        # 长椭球表面积(解析):A = 2πb²(1 + a/(b·e)·arcsin(e)) ≈ 4.19 m²\n        self._A_surf_m2 = 2.0 * np.pi * b**2 * (1.0 + a / (b * e) * np.arcsin(e))\n        self._A_proj_m2 = hull.side_area_m2   # 太阳辐照投影面积(侧照,保守取大面)\n\n    def _step_helium(self, t: float) -> None:\n        hcfg = self.cfg.helium\n        if not hcfg.enabled or self.helium_T_K is None:\n            return\n        atm = self.atmosphere.get_state(self.x[IDX_POS], t)\n        q_solar_W = (hcfg.absorptivity * hcfg.solar_flux_W_m2 * self._A_proj_m2\n                     if hcfg.solar_on else 0.0)\n        q_conv_W = hcfg.h_film_W_m2K * self._A_surf_m2 * (self.helium_T_K - atm.temperature_K)\n        dT_dt = (q_solar_W - q_conv_W) / (self.helium_m_kg * hcfg.cp_J_kgK)\n        self.helium_T_K += dT_dt * self._dt_ctrl_s\n        # 定容排气:囊内压力 = 环境压力,质量随温度/高度变化\n        self.helium_m_kg = atm.pressure_Pa / (self._R_eff_J_kgK * self.helium_T_K) \\\n            * self.cfg.hull.volume_m3\n        self.dynamics.set_helium_mass(self.helium_m_kg)\n\n    def step(self, record: bool = True) -> None:\n        \"\"\"推进一个物理 tick(1ms)。传感器/控制按整数倍 tick 触发。\"\"\"\n        t = self.t_s\n        if self.tick % self._ticks_per_imu == 0:\n            self.sensors.sample_imu(self.x, t)\n        if self.tick % self._ticks_per_baro == 0:\n            self.sensors.sample_baro(self.x, t)\n        if self.tick % self._ticks_per_ctrl == 0:\n            self._step_helium(t)\n            self.cmd = self.controller.update(\n                self.sensors.meas, self.x[IDX_POS], self._dt_ctrl_s)\n            if record:\n                self._record(t)\n        self.x = self.dynamics.step_rk4(self.x, self.cmd.as_array(), t, self.cfg.dt_physics_s)\n        self.tick += 1\n\n    def run(self, duration_s: float, record: bool = True) -> History:\n        n = round(duration_s / self.cfg.dt_physics_s)\n        for _ in range(n):\n            self.step(record=record)\n        return self.history\n\n    def _record(self, t: float) -> None:\n        h = self.history\n        h.t_s.append(t)\n        h.pos_ned_m.append(self.x[IDX_POS].copy())\n        h.euler_rad.append(quat_to_euler(self.x[IDX_QUAT]))\n        h.v_body_m_s.append(self.x[IDX_VEL].copy())\n        h.omega_rad_s.append(self.x[IDX_OMEGA].copy())\n        h.thrust_N.append(self.x[IDX_THRUST].copy())\n        h.cmd_N.append(self.cmd.as_array())\n        h.alt_meas_m.append(self.sensors.meas.altitude_m)\n        d = self.controller.debug\n        h.sp.append((d.alt_sp_m, d.yaw_sp_rad, d.speed_sp_m_s))\n        atm = self.atmosphere.get_state(self.x[IDX_POS], t)\n        h.wind_ned_m_s.append(atm.wind_ned_m_s.copy())\n"}</script>

const WINDOW_S = 30;
class Chart {
  constructor(id, title, unit) {
    this.cv = document.getElementById(id);
    this.ctx = this.cv.getContext('2d');
    this.title = title; this.unit = unit;
    this.data = [];
  }
  push(t, sp, meas) {
    this.data.push({t, sp, meas});
    const t0 = t - WINDOW_S;
    while (this.data.length && this.data[0].t < t0) this.data.shift();
  }
  clear() { this.data = []; }
  draw() {
    const { ctx, cv } = this;
    if (cv.width !== cv.clientWidth*2) { cv.width = cv.clientWidth*2; cv.height = cv.clientHeight*2; }
    const W = cv.width, H = cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.font = '20px ui-monospace'; ctx.fillStyle = '#8fa1bb';
    if (!this.data.length) { ctx.fillText(this.title, 10, 26); return; }
    let lo = Infinity, hi = -Infinity;
    for (const d of this.data) { lo = Math.min(lo,d.sp,d.meas); hi = Math.max(hi,d.sp,d.meas); }
    const pad = Math.max((hi-lo)*0.15, 1e-3); lo -= pad; hi += pad;
    const tEnd = this.data[this.data.length-1].t, t0 = tEnd - WINDOW_S;
    const X = t => (t-t0)/WINDOW_S*W, Y = v => H - (v-lo)/(hi-lo)*H;
    const line = (key, color, dash) => {
      ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.setLineDash(dash);
      ctx.beginPath();
      this.data.forEach((d,i) => i ? ctx.lineTo(X(d.t),Y(d[key])) : ctx.moveTo(X(d.t),Y(d[key])));
      ctx.stroke(); ctx.setLineDash([]);
    };
    line('sp', '#7d8ea6', [8,6]);
    line('meas', '#4fa3e3', []);
    const last = this.data[this.data.length-1];
    ctx.fillStyle = '#8fa1bb';
    ctx.fillText(`${this.title}  ${last.meas.toFixed(2)} ${this.unit} (sp ${last.sp.toFixed(2)})`, 10, 26);
    ctx.fillStyle = '#5e6b7d';
    ctx.fillText(hi.toFixed(1), W-78, 26); ctx.fillText(lo.toFixed(1), W-78, H-10);
  }
}
